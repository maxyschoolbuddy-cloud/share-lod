<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHARE LOD — ເບິ່ງຟາຍ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090909;--surface:#111;--card:#141414;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f2f0eb;--muted:#5a5a5a;--muted2:#888;
  --accent:#c9a96e;--accent-dim:rgba(201,169,110,.12);
  --p:#8b6fff;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter','Noto Sans Lao',sans-serif;
  --lao:'Noto Sans Lao','Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--lao);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ═══════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════ */
header{
  height:64px;padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  background:rgba(9,9,9,.75);
  backdrop-filter:blur(32px) saturate(1.6);
  -webkit-backdrop-filter:blur(32px) saturate(1.6);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:14px;}
.brand-logo{
  width:38px;height:38px;border-radius:8px;overflow:hidden;flex-shrink:0;
  background:var(--card);display:flex;align-items:center;justify-content:center;font-size:16px;
  border:1px solid var(--border2);
}
.brand-logo img{width:100%;height:100%;object-fit:cover;}
.brand-name{
  font-family:var(--serif);font-size:18px;font-weight:600;
  letter-spacing:.5px;color:var(--text);
}
.brand-sub{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.head-right{display:flex;gap:8px;align-items:center;}

/* ── Buttons ── */
.dl-all{
  height:36px;padding:0 20px;
  background:var(--accent);border:none;border-radius:4px;
  color:#000;font-size:11px;font-weight:600;cursor:pointer;
  font-family:var(--lao);letter-spacing:.5px;
  transition:opacity .2s,transform .15s;white-space:nowrap;
}
.dl-all:hover{opacity:.88;transform:translateY(-1px);}
.dl-all:active{transform:translateY(0);}
.dl-star-btn{
  height:36px;padding:0 16px;background:transparent;
  border:1px solid rgba(201,169,110,.3);border-radius:4px;
  color:var(--accent);font-size:11px;font-weight:500;cursor:pointer;
  font-family:var(--lao);letter-spacing:.5px;display:none;
  transition:all .2s;
}
.dl-star-btn:hover{border-color:var(--accent);background:var(--accent-dim);}

/* ═══════════════════════════════════════════════════════
   HERO / PROJECT INFO
═══════════════════════════════════════════════════════ */
main{max-width:1400px;margin:0 auto;padding:52px 40px 24px;}
.proj-info{margin-bottom:40px;padding-bottom:32px;border-bottom:1px solid var(--border);}
.proj-title{
  font-family:var(--serif);font-size:42px;font-weight:400;
  letter-spacing:-.5px;line-height:1.1;color:var(--text);margin-bottom:14px;
}
.proj-meta{display:flex;gap:24px;font-size:11px;color:var(--muted);flex-wrap:wrap;align-items:center;letter-spacing:.5px;}
.proj-meta span{display:flex;align-items:center;gap:6px;}
.meta-dot{width:3px;height:3px;border-radius:50%;background:var(--muted);opacity:.5;}
.star-count-link{color:var(--accent);cursor:pointer;font-weight:500;transition:opacity .2s;}
.star-count-link:hover{opacity:.75;}
.bio{
  font-size:14px;color:var(--muted2);line-height:1.85;
  margin-top:20px;max-width:680px;
}

/* ── Expiry ── */
.exp-banner{border-radius:4px;padding:12px 18px;margin-bottom:24px;display:flex;align-items:center;gap:14px;}
.exp-banner.warn{background:rgba(201,169,110,.06);border:1px solid rgba(201,169,110,.2);}
.exp-banner.danger{background:rgba(200,60,60,.05);border:1px solid rgba(200,60,60,.2);}
.exp-banner h4{font-size:12px;font-weight:600;letter-spacing:.3px;}
.exp-banner.warn h4{color:var(--accent);}
.exp-banner.danger h4{color:#c05555;}
.exp-banner p{font-size:11px;color:var(--muted);margin-top:2px;}

/* ═══════════════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════════════ */
.search-bar{display:flex;gap:8px;margin-bottom:24px;max-width:480px;}
.search-input{
  flex:1;height:40px;padding:0 16px;
  background:transparent;border:none;border-bottom:1px solid var(--border);
  color:var(--text);font-size:13px;font-family:var(--lao);
  outline:none;transition:border-color .2s;letter-spacing:.3px;
}
.search-input:focus{border-bottom-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
.search-cls{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;transition:color .15s;}
.search-cls:hover{color:var(--text);}

/* ─ Star filter bar ─ */
.star-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;margin-bottom:10px;font-size:11px;color:var(--muted);
  border-bottom:1px solid var(--border);letter-spacing:.5px;
}
.star-bar.hidden{display:none;}
.star-bar-cls{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;font-family:var(--lao);transition:color .15s;}
.star-bar-cls:hover{color:var(--text);}

/* ═══════════════════════════════════════════════════════
   NAVIGATION TABS
═══════════════════════════════════════════════════════ */
.ftabs{
  display:flex;gap:0;flex-wrap:nowrap;overflow-x:auto;
  border-bottom:1px solid var(--border);margin-bottom:0;
  scrollbar-width:none;
}
.ftabs::-webkit-scrollbar{display:none;}
.ftab{
  padding:12px 20px;font-size:11px;font-weight:500;cursor:pointer;
  border:none;background:transparent;color:var(--muted);
  font-family:var(--lao);letter-spacing:.8px;text-transform:uppercase;
  border-bottom:1px solid transparent;margin-bottom:-1px;
  transition:color .2s,border-color .2s;white-space:nowrap;flex-shrink:0;
}
.ftab:hover{color:var(--muted2);}
.ftab.on{color:var(--text);border-bottom-color:var(--accent);}

/* ─ Folder sub-tabs ─ */
.sub-ftabs{
  display:none;gap:8px;flex-wrap:wrap;align-items:center;
  padding:16px 0 12px;border-bottom:1px solid var(--border);margin-bottom:0;
}
.sub-ftabs.show{display:flex;}
.sub-ftab{
  padding:5px 16px;font-size:10px;font-weight:500;cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  font-family:var(--lao);letter-spacing:.8px;text-transform:uppercase;
  transition:all .2s;border-radius:2px;
}
.sub-ftab:hover{border-color:var(--border2);color:var(--muted2);}
.sub-ftab.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

/* ─ Face search bar ─ */
.face-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;margin-bottom:10px;
  font-size:11px;color:var(--muted);letter-spacing:.5px;
  border-bottom:1px solid rgba(139,111,255,.15);
}
.face-bar.hidden{display:none;}
.face-bar-cls{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;font-family:var(--lao);transition:color .15s;}
.face-bar-cls:hover{color:var(--text);}

/* ═══════════════════════════════════════════════════════
   GALLERY TOOLBAR
═══════════════════════════════════════════════════════ */
.gallery-top{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 0 14px;
}
.gallery-top-right{display:flex;align-items:center;gap:10px;}
.ct{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.face-btn{
  height:32px;padding:0 14px;border-radius:2px;
  background:transparent;border:1px solid var(--border);
  color:var(--muted);font-size:10px;font-weight:500;cursor:pointer;
  font-family:var(--lao);letter-spacing:.8px;text-transform:uppercase;
  transition:all .2s;display:flex;align-items:center;gap:6px;
}
.face-btn:hover{border-color:var(--border2);color:var(--muted2);}
.face-btn.loading{opacity:.35;cursor:not-allowed;}
.vt{display:flex;gap:1px;}
.vb{
  width:32px;height:32px;border:1px solid var(--border);background:transparent;
  cursor:pointer;color:var(--muted);transition:all .18s;
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.vb:first-child{border-radius:2px 0 0 2px;}
.vb:last-child{border-radius:0 2px 2px 0;border-left:none;}
.vb.on{background:var(--card);color:var(--text);border-color:var(--border2);}

/* ═══════════════════════════════════════════════════════
   PHOTO GRID  — edge-to-edge, cinematic
═══════════════════════════════════════════════════════ */
.gg{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:2px;
}
.gl{display:flex;flex-direction:column;gap:2px;}

.gi{overflow:hidden;cursor:pointer;position:relative;background:#0d0d0d;}
.gi img,.gi video{
  width:100%;aspect-ratio:1;object-fit:cover;display:block;
  transition:transform .5s cubic-bezier(.25,.46,.45,.94),filter .4s;
  filter:brightness(.95);
}
.gi:hover img,.gi:hover video{transform:scale(1.06);filter:brightness(1.05);}

.gi-overlay{
  position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(0,0,0,.0) 40%,rgba(0,0,0,.65) 100%);
  opacity:0;transition:opacity .3s;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:14px;
}
.gi:hover .gi-overlay{opacity:1;}
.gi-actions{display:flex;gap:6px;}

.gi-ph{
  width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  background:#0d0d0d;
}
.gi-ph svg{width:28px;height:28px;opacity:.15;stroke:var(--muted);}

/* ── No footer under photos — clean ── */
.gi-foot{display:none;}

/* ═══════════════════════════════════════════════════════
   ACTION BUTTONS (on hover overlay)
═══════════════════════════════════════════════════════ */
.star-btn{
  width:32px;height:32px;background:rgba(0,0,0,.4);
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);
  border-radius:2px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;color:rgba(255,255,255,.6);font-size:14px;
  transition:all .2s;
}
.star-btn:hover{background:rgba(201,169,110,.25);border-color:var(--accent);color:var(--accent);}
.star-btn.starred{background:rgba(201,169,110,.2);border-color:var(--accent);color:var(--accent);}

.dl-btn{
  width:32px;height:32px;background:rgba(0,0,0,.4);
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);
  border-radius:2px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;color:rgba(255,255,255,.6);font-size:13px;
  transition:all .2s;
}
.dl-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff;}

/* ═══════════════════════════════════════════════════════
   LIST VIEW
═══════════════════════════════════════════════════════ */
.li-row{
  display:flex;align-items:center;gap:14px;padding:12px 0;
  border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .15s;
}
.li-row:hover{background:rgba(255,255,255,.02);}
.li-th{width:44px;height:44px;flex-shrink:0;background:var(--card);overflow:hidden;border-radius:2px;}
.li-th img{width:100%;height:100%;object-fit:cover;display:block;}
.li-info{flex:1;min-width:0;}
.li-name{font-size:13px;color:var(--text);}
.li-folder{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.5px;text-transform:uppercase;}
.li-sz{font-size:11px;color:var(--muted);flex-shrink:0;font-variant-numeric:tabular-nums;}

/* ═══════════════════════════════════════════════════════
   LIGHTBOX  — full immersive
═══════════════════════════════════════════════════════ */
.lb{position:fixed;inset:0;background:#000;z-index:1000;display:flex;align-items:center;justify-content:center;}
.lb.hidden{display:none;}

/* Close */
.lb-x{
  position:absolute;top:24px;left:24px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.7);width:40px;height:40px;border-radius:2px;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:2;
}
.lb-x:hover{background:rgba(255,255,255,.12);color:#fff;}

/* Image */
.lb img,.lb video{max-width:100vw;max-height:100vh;object-fit:contain;display:block;}

/* Bottom bar */
.lb-foot{
  position:absolute;bottom:0;left:0;right:0;
  padding:32px 32px 28px;
  background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 100%);
  display:flex;gap:10px;align-items:center;justify-content:center;
}
.lbb{
  height:40px;padding:0 24px;border-radius:2px;font-size:11px;font-weight:600;
  cursor:pointer;font-family:var(--lao);border:none;
  letter-spacing:.8px;text-transform:uppercase;transition:all .2s;
}
.lbb-dl{background:var(--accent);color:#000;}
.lbb-dl:hover{opacity:.88;transform:translateY(-1px);}
.lbb-nav{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.1);}
.lbb-nav:hover{background:rgba(255,255,255,.14);color:#fff;}
.lb-star{
  width:40px;height:40px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);border-radius:2px;
  font-size:16px;cursor:pointer;color:rgba(255,255,255,.5);
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.lb-star:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.lb-star.starred{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}

/* Counter */
.lb-counter{
  position:absolute;top:28px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;
  font-variant-numeric:tabular-nums;
}

/* ═══════════════════════════════════════════════════════
   FACE SEARCH MODAL
═══════════════════════════════════════════════════════ */
.face-ov{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
.face-ov.hidden{display:none;}
.face-box{
  background:var(--card);border:1px solid var(--border2);
  border-radius:4px;padding:32px;width:100%;max-width:360px;text-align:center;
}
.face-box h3{font-family:var(--serif);font-size:20px;font-weight:400;margin-bottom:6px;letter-spacing:.5px;}
.face-box p{font-size:12px;color:var(--muted);margin-bottom:18px;letter-spacing:.3px;}
#face-video{width:100%;border-radius:2px;background:#000;display:block;aspect-ratio:4/3;object-fit:cover;}
#face-video.mirrored{transform:scaleX(-1);}
.face-status{font-size:11px;color:var(--muted);margin:12px 0 16px;letter-spacing:.5px;}
.face-btns{display:flex;gap:8px;}
.face-btns button{
  flex:1;height:40px;border-radius:2px;font-size:11px;font-weight:600;
  cursor:pointer;font-family:var(--lao);border:none;
  letter-spacing:.8px;text-transform:uppercase;transition:opacity .15s;
}
.face-btns button:disabled{opacity:.3;cursor:not-allowed;}
.fbtn-cap{background:var(--accent);color:#000;}
.fbtn-cap:hover:not(:disabled){opacity:.85;}
.fbtn-flip{background:transparent;color:var(--muted2);border:1px solid var(--border);}
.fbtn-cls{background:transparent;color:var(--muted);border:1px solid var(--border);}
canvas#face-canvas{display:none;}

/* ═══════════════════════════════════════════════════════
   RATING SECTION
═══════════════════════════════════════════════════════ */
.rating-wrap{max-width:1400px;margin:0 auto 60px;padding:0 40px;}
.rating-card{border-top:1px solid var(--border);padding:40px 0;}
.rating-card h3{font-family:var(--serif);font-size:24px;font-weight:400;margin-bottom:6px;letter-spacing:.5px;}
.rating-card p{font-size:12px;color:var(--muted);margin-bottom:28px;letter-spacing:.3px;}
.rstar-row{display:flex;gap:4px;margin-bottom:24px;}
.rstar-row span{
  font-size:26px;cursor:pointer;line-height:1;
  opacity:.2;transition:opacity .2s,transform .15s;
}
.rstar-row span.lit{opacity:1;color:var(--accent);}
.rstar-row span:hover{transform:scale(1.1);}
.rating-inp{
  width:100%;padding:11px 0;
  background:transparent;border:none;border-bottom:1px solid var(--border);
  color:var(--text);font-size:13px;font-family:var(--lao);
  outline:none;margin-bottom:14px;transition:border-color .2s;
  max-width:480px;display:block;letter-spacing:.3px;
}
.rating-inp:focus{border-bottom-color:var(--accent);}
.rating-inp::placeholder{color:var(--muted);}
.rating-ta{resize:none;min-height:72px;}
.rating-submit{
  height:40px;padding:0 32px;background:var(--accent);border:none;border-radius:2px;
  color:#000;font-size:11px;font-weight:600;cursor:pointer;
  font-family:var(--lao);letter-spacing:.8px;text-transform:uppercase;
  transition:opacity .15s,transform .15s;
}
.rating-submit:hover{opacity:.88;transform:translateY(-1px);}
.rating-done{
  padding:20px 0;font-size:13px;color:rgba(180,220,180,.8);letter-spacing:.3px;
}

/* ═══════════════════════════════════════════════════════
   LOADING / EMPTY STATES
═══════════════════════════════════════════════════════ */
.st{text-align:center;padding:100px 20px;}
.st-icon{font-size:32px;margin-bottom:16px;opacity:.25;}
.st p{font-size:12px;color:var(--muted);letter-spacing:.5px;}
.spinner{
  width:20px;height:20px;margin:0 auto 16px;
  border:1px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

footer{
  text-align:center;padding:28px 40px;
  font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;
  border-top:1px solid var(--border);
}

/* ═══════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════ */
@media(max-width:768px){
  header{padding:0 20px;height:56px;}
  main{padding:32px 20px 16px;}
  .proj-title{font-size:30px;}
  .gg{grid-template-columns:repeat(2,1fr);}
  .gallery-top{flex-direction:column;align-items:flex-start;gap:12px;}
  .rating-wrap{padding:0 20px;}
  .lb-foot{padding:20px 16px;}
  footer{padding:20px;}
}
@media(max-width:420px){
  .gg{grid-template-columns:repeat(2,1fr);gap:1px;}
  .proj-title{font-size:26px;}
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div id="app"><div class="st"><div class="spinner"></div><p style="color:var(--muted)">ກຳລັງໂຫຼດ...</p></div></div>

<!-- LIGHTBOX -->
<div class="lb hidden" id="lb">
  <button class="lb-x" onclick="closeLb()">✕</button>
  <div class="lb-counter" id="lb-counter"></div>
  <div id="lb-body"></div>
  <div class="lb-foot">
    <button class="lbb lbb-nav" onclick="navLb(-1)">←</button>
    <button class="lb-star" id="lb-star" onclick="lbToggleStar()">☆</button>
    <button class="lbb lbb-dl" id="lb-dl" onclick="dlFile(this.dataset.url,this.dataset.name)">Download</button>
    <button class="lbb lbb-nav" onclick="navLb(1)">→</button>
  </div>
</div>

<!-- FACE MODAL -->
<div class="face-ov hidden" id="face-modal">
  <div class="face-box">
    <h3>🤳 ຄົ້ນຫາດ້ວຍໃບໜ້າ</h3>
    <p>ຈ້ອງກ້ອງ ແລ້ວກົດຖ່າຍ</p>
    <video id="face-video" autoplay muted playsinline></video>
    <div class="face-status" id="face-status">ກຳລັງເປີດ Camera...</div>
    <canvas id="face-canvas"></canvas>
    <div class="face-btns">
      <button class="fbtn-flip" id="btn-flip" onclick="flipCamera()" disabled>🔄 ສະລັບ</button>
      <button class="fbtn-cap" id="btn-cap" onclick="captureAndSearch()" disabled>📸 ຖ່າຍ & ຊອກ</button>
      <button class="fbtn-cls" onclick="closeFaceModal()">ຍົກເລີກ</button>
    </div>
  </div>
</div>


<script type="module">

// Row 1: select project → show folder sub-tabs
let _selProjId=null;
window.selectProject=(projId,el)=>{
  _selProjId=projId;
  faceFilterIds=null;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const projLabel=projId?el.textContent.replace(/\s*\(\d+\)$/,'').trim():null;
  // Build folder sub-tabs
  const sub=document.getElementById('sub-ftabs');
  const pFiles=projId?files.filter(f=>f.project_id===projId):files;
  const folders=[...new Set(pFiles.map(f=>f.folder_name).filter(Boolean))];
  if(folders.length){
    sub.className='sub-ftabs show';
    sub.innerHTML=`<button class="sub-ftab on" onclick="selectFolder(null,this,'${(projLabel||'').replace(/'/g,"\\'")}')">ທັງໝົດ (${pFiles.length})</button>`
      +folders.map(fn=>`<button class="sub-ftab" onclick="selectFolder('${fn}',this,'${fn.replace(/'/g,"\\'")}')">📂 ${fn} (${pFiles.filter(f=>f.folder_name===fn).length})</button>`).join('');
  } else {
    sub.className='sub-ftabs';sub.innerHTML='';
  }
  applyClientFilter(projId,null,projLabel);
};
// Row 2: select folder within selected project
window.selectFolder=(folderName,el,label)=>{
  document.querySelectorAll('.sub-ftab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  applyClientFilter(_selProjId,folderName,label||folderName);
};
function applyClientFilter(projId,folderName,label){
  let f=files;
  if(projId) f=f.filter(x=>x.project_id===projId);
  if(folderName) f=f.filter(x=>x.folder_name===folderName);
  if(starFilterOn) f=f.filter(x=>starSet.has(x.id));
  if(searchQ) f=f.filter(x=>(x.name||'').toLowerCase().includes(searchQ.toLowerCase()));
  viewFiles=f;
  const cnt=document.getElementById('gal-count');
  if(cnt) cnt.textContent=`${viewFiles.length} ລາຍການ`;
  updateDlBtn(label,viewFiles.length);
  renderGalleryContent();
}
function updateDlBtn(label,count){
  const btn=document.getElementById('dl-all-btn');
  if(!btn) return;
  if(!label||label==='all') btn.textContent=`⬇ Download ທັງໝົດ (${count})`;
  else btn.textContent=`⬇ Download "${label}" (${count})`;
}

// ─── [3] STARS — per share_token ─────────────────────────
const starToken = clientToken||token; // use whichever is available
async function loadStars(){
  const {data}=await sb.from('photo_stars').select('file_id').eq('project_id',projId).eq('share_token',starToken);
  starSet=new Set((data||[]).map(s=>s.file_id));
}
window.toggleStar=async(fileId,btn)=>{
  const f=files.find(x=>x.id===fileId);
  if(starSet.has(fileId)){
    await sb.from('photo_stars').delete().eq('file_id',fileId).eq('share_token',starToken);
    starSet.delete(fileId);
    btn.textContent='☆';btn.classList.remove('starred');
  }else{
    await sb.from('photo_stars').insert({file_id:fileId,project_id:f?.project_id||projId,studio_uid:f?.uid||studioUid,share_token:starToken});
    starSet.add(fileId);
    btn.textContent='★';btn.classList.add('starred');
    btn.style.animation='pop .25s ease';setTimeout(()=>btn.style.animation='',250);
  }
  updateStarUI();
};
function updateStarUI(){
  // update star-bar count
  const sbc=document.getElementById('star-bar-cnt');
  if(sbc) sbc.textContent=starSet.size;
  // update meta star link
  const smeta=document.getElementById('star-count-meta');
  if(smeta){
    if(starSet.size>0) smeta.innerHTML=`<a class="star-count-link" onclick="filterByStars()">⭐ ${starSet.size} ໝາຍດາວ</a>`;
    else smeta.innerHTML='';
  }
  // update dl-starred-btn
  const dsb=document.getElementById('dl-starred-btn');
  if(dsb){dsb.style.display=starSet.size>0?'inline-block':'none';dsb.textContent=`⭐ Download ດາວ (${starSet.size})`;}
  if(starFilterOn) renderGallery();
}
window.filterByStars=()=>{starFilterOn=true;document.getElementById('star-bar').classList.remove('hidden');renderGallery();};
window.clearStarFilter=()=>{starFilterOn=false;document.getElementById('star-bar').classList.add('hidden');renderGallery();};

// ─── FOLDER TABS ───────────────────────────────────────────
function renderFolderTabs(){
  const folders=[...new Set(files.map(f=>f.folder_name).filter(Boolean))];
  const el=document.getElementById('ftabs');
  if(!folders.length){el.style.display='none';return;}
  el.innerHTML=`<button class="ftab on" onclick="setFolder(null,this)">ທັງໝົດ (${files.length})</button>`
    +folders.map(fn=>`<button class="ftab" onclick="setFolder('${fn}',this)">📂 ${fn} (${files.filter(f=>f.folder_name===fn).length})</button>`).join('');
}
window.setFolder=(folder,el)=>{
  activeFolder=folder;faceFilterIds=null;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');renderGallery();
};

// ─── GALLERY ───────────────────────────────────────────────
function getFiltered(){
  let f=files;
  if(activeFolder) f=f.filter(x=>x.folder_name===activeFolder);
  if(faceFilterIds) f=f.filter(x=>faceFilterIds.has(x.id));
  if(starFilterOn) f=f.filter(x=>starSet.has(x.id));
  if(searchQ){const q=searchQ.toLowerCase();f=f.filter(x=>(x.name||'').toLowerCase().includes(q)||(x.folder_name||'').toLowerCase().includes(q));}
  return f;
}
window.setView=mode=>{view=mode;document.getElementById('vg').classList.toggle('on',mode==='grid');document.getElementById('vl').classList.toggle('on',mode==='list');renderGallery();};
window.onSearch=q=>{searchQ=q;document.getElementById('search-cls').style.display=q?'block':'none';renderGallery();};
window.clearSearch=()=>{searchQ='';document.getElementById('search-input').value='';document.getElementById('search-cls').style.display='none';renderGallery();};

function renderGallery(){
  viewFiles=getFiltered();
  const cnt=document.getElementById('gal-count');
  if(cnt) cnt.textContent=`${viewFiles.length} ລາຍການ`;
  // Update download button label
  const folderLabel=activeFolder||null;
  updateDlBtn(folderLabel,viewFiles.length);
  renderGalleryContent();
}
function renderGalleryContent(){
  const g=document.getElementById('gallery');
  if(!viewFiles.length){g.innerHTML='<div class="st"><div class="st-icon">📭</div><p style="color:var(--muted)">ບໍ່ພົບຮູບ</p></div>';return;}
  if(view==='grid'){
    g.innerHTML=`<div class="gg">${viewFiles.map((f,i)=>`
      <div class="gi" onclick="openLb(${i})">
        ${f.mime_type?.startsWith('image')?`<img src="${f.url}" loading="lazy" alt="${f.name}">`
          :f.mime_type?.startsWith('video')?`<video src="${f.url}" muted>`
          :`<div class="gi-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg></div>`}
        <div class="gi-overlay">
          <button class="star-btn ${starSet.has(f.id)?'starred':''}" data-star="${f.id}" onclick="event.stopPropagation();toggleStar('${f.id}',this)">${starSet.has(f.id)?'★':'☆'}</button>
          <button class="dl-btn" onclick="event.stopPropagation();dlFile('${f.url}','${f.name}')">↓</button>
        </div>
        <div class="gi-foot">
          <div class="gi-info"><div class="gi-name">${f.name}</div></div>
        </div>
      </div>`).join('')}</div>`;
  }else{
    g.innerHTML=`<div class="gl">${viewFiles.map((f,i)=>`
      <div class="li-row" onclick="openLb(${i})">
        <div class="li-th">${f.mime_type?.startsWith('image')?`<img src="${f.url}" loading="lazy">`:f.mime_type?.startsWith('video')?'▶':'📄'}</div>
        <div class="li-info">
          ${f.folder_name?`<div class="li-folder">${f.folder_name}</div>`:''}
          <div class="li-name">${f.name}</div>
        </div>
        <span class="li-sz">${fmt(f.size||0)}</span>
        <button class="star-btn ${starSet.has(f.id)?'starred':''}" data-star="${f.id}" onclick="event.stopPropagation();toggleStar('${f.id}',this)">${starSet.has(f.id)?'★':'☆'}</button>
        <button class="dl-btn" onclick="event.stopPropagation();dlFile('${f.url}','${f.name}')">↓</button>
      </div>`).join('')}</div>`;
  }
}

// ─── LIGHTBOX ──────────────────────────────────────────────
window.openLb=i=>{lbIdx=i;updLb();document.getElementById('lb').classList.remove('hidden');};
window.closeLb=()=>document.getElementById('lb').classList.add('hidden');
window.navLb=d=>{lbIdx=Math.max(0,Math.min(viewFiles.length-1,lbIdx+d));updLb();};
function updLb(){
  const f=viewFiles[lbIdx]; if(!f)return;
  const b=document.getElementById('lb-body');
  if(f.mime_type?.startsWith('image'))b.innerHTML=`<img src="${f.url}" alt="${f.name}">`;
  else if(f.mime_type?.startsWith('video'))b.innerHTML=`<video src="${f.url}" controls autoplay style="max-width:100vw;max-height:100vh;"></video>`;
  else b.innerHTML=`<div style="color:rgba(255,255,255,.5);text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px;opacity:.3">◻</div><p style="font-size:12px;letter-spacing:1px">${f.name}</p></div>`;
  const ctr=document.getElementById('lb-counter');
  if(ctr) ctr.textContent=`${lbIdx+1} / ${viewFiles.length}`;
  const lbStar=document.getElementById('lb-star');
  lbStar.textContent=starSet.has(f.id)?'★':'☆';
  lbStar.classList.toggle('starred',starSet.has(f.id));
  const dl=document.getElementById('lb-dl'); dl.dataset.url=f.url; dl.dataset.name=f.name;
}

// ─── [2] FACE SEARCH — camera flip + mirror fix ───────────
window.openFaceModal=()=>{
  if(!faceReady){alert('AI ກຳລັງໂຫຼດ... ລໍຖ້າ 30 ວິ');return;}
  document.getElementById('face-modal').classList.remove('hidden');
  startCamera();
};
async function startCamera(){
  if(faceStream){faceStream.getTracks().forEach(t=>t.stop());faceStream=null;}
  document.getElementById('face-status').textContent='ກຳລັງເປີດ Camera...';
  document.getElementById('btn-cap').disabled=true;
  document.getElementById('btn-flip').disabled=true;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode}});
    faceStream=stream;
    const vid=document.getElementById('face-video');
    vid.srcObject=stream;
    // Mirror front camera for natural selfie feel; back camera shows reality
    vid.className=facingMode==='user'?'mirrored':'';
    document.getElementById('face-status').textContent='📸 ຈ້ອງກ້ອງ ແລ້ວກົດຖ່າຍ';
    document.getElementById('btn-cap').disabled=false;
    document.getElementById('btn-flip').disabled=false;
  }catch(e){
    document.getElementById('face-status').textContent='❌ ເປີດ Camera ບໍ່ໄດ້';
  }
}
window.flipCamera=async()=>{
  facingMode=facingMode==='user'?'environment':'user';
  await startCamera();
};
window.closeFaceModal=()=>{
  if(faceStream){faceStream.getTracks().forEach(t=>t.stop());faceStream=null;}
  document.getElementById('face-modal').classList.add('hidden');
};
window.captureAndSearch=async()=>{
  const vid=document.getElementById('face-video');
  const canvas=document.getElementById('face-canvas');
  // Capture at full resolution for better accuracy
  canvas.width=vid.videoWidth;canvas.height=vid.videoHeight;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(vid,0,0);
  document.getElementById('face-status').textContent='🔍 ກຳລັງວິເຄາະ...';
  document.getElementById('btn-cap').disabled=true;
  try{
    // Use SsdMobilenetv1 — ແມ່ນຍຳກວ່າ TinyFace, minConfidence 0.5
    const detOpts=new faceapi.SsdMobilenetv1Options({minConfidence:0.5});
    // Detect all faces in capture and pick the largest/most confident one
    const dets=await faceapi.detectAllFaces(canvas,detOpts).withFaceLandmarks().withFaceDescriptors();
    if(!dets.length){document.getElementById('face-status').textContent='😕 ບໍ່ພົບໜ້າ — ລອງໃໝ່';document.getElementById('btn-cap').disabled=false;return;}
    // Pick the face with the largest bounding box (closest to camera = main subject)
    const det=dets.reduce((a,b)=>
      (a.detection.box.area>b.detection.box.area)?a:b
    );
    const ref=det.descriptor;
    // Threshold 0.45 = ເຄັ່ງກວ່າ (ແມ່ນຍຳກວ່າ), 0.6 = ຜ່ອນຄາຍ
    const THRESHOLD=0.45;
    const matches=files.filter(f=>{
      if(!f.face_descriptor||!f.mime_type?.startsWith('image'))return false;
      try{
        const raw=Array.isArray(f.face_descriptor)?f.face_descriptor:Object.values(f.face_descriptor);
        const stored=new Float32Array(raw);
        return faceapi.euclideanDistance(stored,ref)<THRESHOLD;
      }catch(e){return false;}
    });
    closeFaceModal();
    faceFilterIds=new Set(matches.map(f=>f.id));
    activeFolder=null;
    document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
    const bar=document.getElementById('face-bar');bar.classList.remove('hidden');
    document.getElementById('face-bar-txt').textContent=`📷 ພົບ ${matches.length} ຮູບທີ່ມີໜ້າຂອງທ່ານ`;
    renderGallery();
  }catch(e){document.getElementById('face-status').textContent='❌ '+e.message;document.getElementById('btn-cap').disabled=false;}
};
window.clearFaceSearch=()=>{faceFilterIds=null;document.getElementById('face-bar').classList.add('hidden');renderGallery();};


// ─── [4+5] DOWNLOAD — folder-aware + iOS Photos ───────────
const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent)&&!window.MSStream;
window.dlFile=async(url,name)=>{
  try{
    const r=await fetch(url);
    const blob=await r.blob();
    // [5] iOS: use Web Share API → saves to Photos app
    if(isIOS&&navigator.share&&navigator.canShare){
      const file=new File([blob],name,{type:blob.type});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:name});
        return;
      }
    }
    // Other: create blob URL and trigger download
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  }catch(e){
    window.open(url,'_blank');
  }
};
// [4] Download only current view (respects folder/star/face filter)
window.dlAll=()=>{
  if(!viewFiles.length)return;
  viewFiles.forEach((f,i)=>setTimeout(()=>dlFile(f.url,f.name),i*800));
};
// [4] Download only starred files
window.dlStarred=()=>{
  const starred=files.filter(f=>starSet.has(f.id));
  if(!starred.length){alert('ຍັງບໍ່ທັນໝາຍດາວຮູບໃດ');return;}
  starred.forEach((f,i)=>setTimeout(()=>dlFile(f.url,f.name),i*800));
};

// ─── UTILS ─────────────────────────────────────────────────
async function trackView(){
  if(!studioUid)return;
  try{await sb.from('gallery_views').insert({project_id:projId,studio_uid:studioUid});}catch(e){}
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('hidden')){
    if(e.key==='Escape')closeLb();if(e.key==='ArrowLeft')navLb(-1);if(e.key==='ArrowRight')navLb(1);if(e.key==='s')lbToggleStar();
  }else if(e.key==='Escape')closeFaceModal();
});

// ─── [6] RATING SYSTEM ─────────────────────────────────────
let selRating=0;
const ratingKey=`rated_${projId}_${token}`;

async function renderRatingSection(){
  // Check if already rated
  const {data:existing}=await sb.from('ratings').select('id,score,comment').eq('share_token',token).eq('project_id',projId).maybeSingle();

  const wrap=document.createElement('div');
  wrap.className='rating-wrap';

  if(existing){
    wrap.innerHTML=`
      <div class="rating-card">
        <h3>⭐ ຂອບໃຈສຳລັບ Review!</h3>
        <p style="font-size:13px;color:var(--muted)">ທ່ານໃຫ້ ${'★'.repeat(existing.score)+'☆'.repeat(5-existing.score)} ${existing.comment?`— "${existing.comment}"`:''}
        </p>
      </div>`;
  } else {
    wrap.innerHTML=`
      <div class="rating-card">
        <h3>⭐ ໃຫ້ຄະແນນການບໍລິການ</h3>
        <p>ຊ່ວຍ Studio ປັບປຸງໄດ້ດ້ວຍ Review ຂອງທ່ານ</p>
        <div class="rstar-row" id="rstar-row">
          ${[1,2,3,4,5].map(n=>`<span id="rs${n}" onclick="setRatingStar(${n})">☆</span>`).join('')}
        </div>
        <input class="rating-inp" id="r-name" placeholder="ຊື່ຂອງທ່ານ *">
        <textarea class="rating-inp rating-ta" id="r-comment" placeholder="ຄຳເຫັນ (ທາງເລືອກ)..."></textarea>
        <button class="rating-submit" onclick="submitRating()">ສົ່ງ Review</button>
        <span id="r-msg" style="font-size:12px;margin-left:10px;display:none"></span>
      </div>`;
  }

  wrap.innerHTML += `<footer>ສ່ວນໜຶ່ງຂອງ SHARE LOD · ລະບົບຝາກຟາຍສຳລັບຊ່າງພາບ</footer>`;
  document.getElementById('app').appendChild(wrap);
}

window.setRatingStar=n=>{
  selRating=n;
  [1,2,3,4,5].forEach(i=>{const el=document.getElementById('rs'+i);if(el){el.textContent='★';el.classList.toggle('lit',i<=n);}});
};

window.submitRating=async()=>{
  const name=document.getElementById('r-name')?.value.trim();
  const comment=document.getElementById('r-comment')?.value.trim();
  const msg=document.getElementById('r-msg');
  if(!selRating){msg.textContent='⚠️ ເລືອກຄະແນນດາວ';msg.style.color='#f5c842';msg.style.display='inline';return;}
  if(!name){msg.textContent='⚠️ ໃສ່ຊື່ຂອງທ່ານ';msg.style.color='#f5c842';msg.style.display='inline';return;}
  msg.textContent='ກຳລັງສົ່ງ...';msg.style.color='var(--muted)';msg.style.display='inline';
  const {error}=await sb.from('ratings').insert({
    studio_uid:studioUid,
    project_id:projId,
    share_token:token,
    score:selRating,
    reviewer_name:name,
    comment:comment||null
  });
  if(error){msg.textContent='❌ ຜິດພາດ: '+error.message;msg.style.color='#ff6060';return;}
  // Show thank you
  const card=document.querySelector('.rating-card');
  if(card) card.innerHTML=`<div class="rating-done">✅ ຂອບໃຈສຳລັບ Review! ${'★'.repeat(selRating)}</div>`;
};
