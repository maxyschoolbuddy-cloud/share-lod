<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHARE LOD — ເບິ່ງຟາຍ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080e;
  --s1:#0f0f1a;--s2:#13131f;
  --border:rgba(255,255,255,.08);
  --text:#f0eeff;--muted:#6b6a8a;--muted2:#9d9bba;
  --pu:#a855f7;--pi:#ec4899;--cy:#22d3ee;--gr:#10b981;
  --aura:linear-gradient(135deg,#a855f7,#ec4899,#22d3ee);
  --aura2:linear-gradient(135deg,#7c3aed,#db2777);
  --glow-p:rgba(168,85,247,.35);--glow-pi:rgba(236,72,153,.25);
  --f:'Space Grotesk','Noto Sans Lao',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--f);background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%,rgba(168,85,247,.12) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%,rgba(236,72,153,.08) 0%,transparent 60%);
}

/* HEADER */
header{
  padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:50;
  background:rgba(8,8,14,.75);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
.brand-logo{
  width:44px;height:44px;border-radius:14px;overflow:hidden;flex-shrink:0;
  background:linear-gradient(135deg,var(--pu),var(--pi));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 16px var(--glow-p);
}
.brand-logo img{width:100%;height:100%;object-fit:cover;}
.brand-info{flex:1;min-width:0;}
.brand-name{font-size:15px;font-weight:700;background:var(--aura);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;}
.brand-bio{font-size:9.5px;color:var(--muted);margin-top:1px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;letter-spacing:.2px;}
.brand-socials{display:flex;gap:8px;margin-top:4px;align-items:center;}
.soc-link{width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:11px;transition:all .2s;flex-shrink:0;}
.soc-link:hover{background:rgba(168,85,247,.2);border-color:rgba(168,85,247,.4);transform:scale(1.1);}
.head-right{display:flex;gap:8px;align-items:center;flex-shrink:0;}

/* SELECTION MODE */
.sel-bar{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  z-index:200;display:flex;align-items:center;gap:10px;
  background:rgba(15,15,26,.92);backdrop-filter:blur(20px);
  border:1px solid rgba(168,85,247,.35);border-radius:100px;
  padding:10px 16px 10px 20px;
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(168,85,247,.2);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  opacity:0;pointer-events:none;white-space:nowrap;
}
.sel-bar.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto;}
.sel-count{font-size:13px;font-weight:600;color:var(--text);}
.sel-count span{
  background:var(--aura);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;
}
.sel-cancel{
  background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:100px;
  color:var(--muted2);font-size:12px;font-weight:500;cursor:pointer;
  padding:6px 14px;font-family:var(--f);transition:all .2s;
}
.sel-cancel:hover{color:var(--text);border-color:var(--border);}
.sel-dl{
  background:linear-gradient(135deg,var(--pu),var(--pi));
  border:none;border-radius:100px;
  color:#fff;font-size:12px;font-weight:600;cursor:pointer;
  padding:8px 20px;font-family:var(--f);transition:all .2s;
  box-shadow:0 0 16px var(--glow-p);
}
.sel-dl:hover{opacity:.9;transform:scale(1.03);}

/* PHOTO SELECTED STATE */
.gi.selected{border-color:var(--pu) !important;box-shadow:0 0 0 2px var(--pu),0 0 20px var(--glow-p);}
.gi.selected .gi-check{opacity:1;}
.gi-check{
  position:absolute;top:10px;right:10px;
  width:26px;height:26px;border-radius:8px;
  background:linear-gradient(135deg,var(--pu),var(--pi));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#fff;opacity:0;
  transition:opacity .2s,transform .2s;z-index:5;
  box-shadow:0 2px 10px var(--glow-p);
  transform:scale(0.7);
}
.gi.selected .gi-check{opacity:1;transform:scale(1);}

/* LONG PRESS RIPPLE */
@keyframes lp-ring{0%{transform:scale(.8);opacity:.6}100%{transform:scale(1.5);opacity:0}}
.gi.pressing::after{
  content:'';position:absolute;inset:0;border-radius:16px;
  border:2px solid var(--pu);animation:lp-ring .5s ease-out forwards;
  pointer-events:none;
}

/* BUTTONS */
.dl-all{
  height:36px;padding:0 20px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--pu),var(--pi));
  color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);
  transition:opacity .2s,transform .15s,box-shadow .2s;white-space:nowrap;
  box-shadow:0 0 20px var(--glow-p);
}
.dl-all:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 30px var(--glow-pi);}
.dl-star-btn{
  height:36px;padding:0 16px;background:rgba(168,85,247,.12);
  border:1px solid rgba(168,85,247,.3);border-radius:12px;
  color:var(--pu);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);
  display:none;transition:all .2s;
}
.dl-star-btn:hover{background:rgba(168,85,247,.22);border-color:var(--pu);}

/* MAIN */
main{max-width:1280px;margin:0 auto;padding:40px 24px 20px;}

/* PROJECT INFO */
.proj-info{margin-bottom:36px;}
.proj-title{
  font-size:36px;font-weight:700;line-height:1.15;margin-bottom:12px;
  background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.55));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.proj-meta{display:flex;gap:16px;font-size:12px;color:var(--muted);flex-wrap:wrap;align-items:center;}
.proj-meta span{display:flex;align-items:center;gap:5px;}
.meta-dot{width:3px;height:3px;border-radius:50%;background:var(--muted);opacity:.4;}
.star-count-link{color:var(--pu);cursor:pointer;font-weight:600;transition:opacity .2s;}
.star-count-link:hover{opacity:.75;}
.bio{font-size:13px;color:var(--muted2);line-height:1.8;margin-top:16px;max-width:600px;}

/* EXPIRY */
.exp-banner{border-radius:16px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.exp-banner.warn{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);}
.exp-banner.danger{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);}
.exp-banner h4{font-size:12px;font-weight:600;}
.exp-banner.warn h4{color:#fbbf24;}.exp-banner.danger h4{color:#f87171;}
.exp-banner p{font-size:11px;color:var(--muted);margin-top:2px;}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:20px;max-width:500px;}
.search-input{
  flex:1;height:42px;padding:0 16px;
  background:var(--s1);border:1px solid var(--border);border-radius:14px;
  color:var(--text);font-size:13px;font-family:var(--f);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.search-input:focus{border-color:rgba(168,85,247,.5);box-shadow:0 0 0 3px rgba(168,85,247,.1);}
.search-input::placeholder{color:var(--muted);}
.search-cls{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;transition:color .15s;}
.search-cls:hover{color:var(--text);}

/* STAR BAR */
.star-bar{
  background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.15);
  border-radius:12px;padding:10px 16px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted2);
}
.star-bar.hidden{display:none;}
.star-bar-cls{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;font-family:var(--f);transition:color .15s;}
.star-bar-cls:hover{color:var(--text);}

/* TABS — scrollable pills */
.ftabs{
  display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;
  padding-bottom:16px;margin-bottom:0;scrollbar-width:none;
}
.ftabs::-webkit-scrollbar{display:none;}
.ftab{
  padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  font-family:var(--f);border-radius:100px;white-space:nowrap;flex-shrink:0;
  transition:all .2s;
}
.ftab:hover{border-color:rgba(168,85,247,.4);color:var(--muted2);}
.ftab.on{
  background:linear-gradient(135deg,var(--pu),var(--pi));
  border-color:transparent;color:#fff;
  box-shadow:0 0 16px var(--glow-p);
}

/* FOLDER CHIPS */
.sub-ftabs{
  display:none;gap:6px;flex-wrap:wrap;padding:12px 0 16px;
}
.sub-ftabs.show{display:flex;}
.sub-ftab{
  padding:5px 14px;font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--s1);color:var(--muted);
  font-family:var(--f);border-radius:100px;transition:all .2s;
}
.sub-ftab:hover{border-color:rgba(34,211,238,.4);color:var(--cy);}
.sub-ftab.on{background:rgba(34,211,238,.12);border-color:rgba(34,211,238,.4);color:var(--cy);}

/* FACE BAR */
.face-bar{
  background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.15);
  border-radius:12px;padding:10px 16px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted2);
}
.face-bar.hidden{display:none;}
.face-bar-cls{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;font-family:var(--f);transition:color .15s;}
.face-bar-cls:hover{color:var(--text);}

/* GALLERY TOOLBAR */
.gallery-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.gallery-top-right{display:flex;align-items:center;gap:8px;}
.ct{font-size:11px;color:var(--muted);}
.face-btn{
  height:34px;padding:0 14px;border-radius:10px;
  background:var(--s1);border:1px solid var(--border);
  color:var(--muted2);font-size:11px;font-weight:600;cursor:pointer;
  font-family:var(--f);transition:all .2s;display:flex;align-items:center;gap:6px;
}
.face-btn:hover{border-color:rgba(168,85,247,.4);color:var(--pu);}
.face-btn.loading{opacity:.4;cursor:not-allowed;}
.vt{display:flex;gap:4px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:3px;}
.vb{width:28px;height:28px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--muted);transition:all .18s;display:flex;align-items:center;justify-content:center;}
.vb.on{background:rgba(168,85,247,.2);color:var(--pu);}

/* PHOTO GRID */
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.gl{display:flex;flex-direction:column;gap:6px;}
.gi{
  background:var(--s2);overflow:hidden;cursor:pointer;position:relative;
  border-radius:16px;border:1px solid var(--border);
  transition:transform .3s,box-shadow .3s,border-color .3s;
}
.gi:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.4),0 0 0 1px rgba(168,85,247,.2);}
.gi img,.gi video{width:100%;aspect-ratio:1;object-fit:cover;display:block;transition:transform .5s;}
.gi:hover img,.gi:hover video{transform:scale(1.05);}
.gi-overlay{
  position:absolute;inset:0;border-radius:16px;
  background:linear-gradient(to top,rgba(8,8,14,.85) 0%,transparent 55%);
  opacity:0;transition:opacity .3s;
  display:flex;flex-direction:column;justify-content:flex-end;padding:12px;
}
.gi:hover .gi-overlay{opacity:1;}
.gi-actions{display:flex;gap:6px;}
.gi-ph{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--s2);}
.gi-ph svg{width:28px;height:28px;opacity:.15;stroke:var(--muted);}
.gi-foot{display:none;}

/* ACTION BUTTONS — inside overlay (desktop hover) */
.star-btn{
  width:32px;height:32px;
  background:rgba(8,8,14,.6);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.15);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;color:rgba(255,255,255,.7);font-size:16px;
  transition:all .2s;
}
.star-btn:hover,.star-btn.starred{background:rgba(245,200,66,.2);border-color:#f5c842;color:#f5c842;}

.dl-btn{
  width:32px;height:32px;
  background:rgba(8,8,14,.6);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.15);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;color:rgba(255,255,255,.7);font-size:14px;
  transition:all .2s;
}
.dl-btn:hover{background:rgba(34,211,238,.2);border-color:var(--cy);color:var(--cy);}

/* STAR CORNER — always visible on photo (mobile-friendly) */
.gi-star-corner{
  position:absolute;bottom:8px;right:8px;z-index:6;
  width:30px;height:30px;border-radius:8px;
  background:rgba(8,8,14,.55);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;cursor:pointer;color:rgba(255,255,255,.5);
  transition:all .2s;
}
.gi-star-corner:hover,.gi-star-corner.starred{color:#f5c842;border-color:rgba(245,200,66,.5);background:rgba(245,200,66,.15);}
.gi-star-corner.starred{color:#f5c842 !important;}

/* LIST VIEW */
.li-row{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--s1);border:1px solid var(--border);border-radius:12px;
  cursor:pointer;transition:all .2s;margin-bottom:4px;
}
.li-row:hover{border-color:rgba(168,85,247,.3);background:rgba(168,85,247,.05);}
.li-th{width:42px;height:42px;flex-shrink:0;background:var(--s2);overflow:hidden;border-radius:10px;}
.li-th img{width:100%;height:100%;object-fit:cover;display:block;}
.li-info{flex:1;min-width:0;}
.li-name{font-size:13px;font-weight:500;color:var(--text);}
.li-folder{font-size:10px;color:var(--muted);margin-top:2px;}
.li-sz{font-size:11px;color:var(--muted);flex-shrink:0;}

/* LIGHTBOX */
.lb{position:fixed;inset:0;background:rgba(8,8,14,.97);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);}
.lb.hidden{display:none;}
.lb-x{
  position:absolute;top:20px;left:20px;z-index:2;
  background:rgba(255,255,255,.07);border:1px solid var(--border);
  color:var(--muted2);width:40px;height:40px;border-radius:12px;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.lb-x:hover{background:rgba(255,255,255,.12);color:#fff;}
.lb img,.lb video{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:12px;}
.lb-foot{
  position:absolute;bottom:0;left:0;right:0;
  padding:28px 24px;
  background:linear-gradient(to top,rgba(8,8,14,.9),transparent);
  display:flex;gap:8px;align-items:center;justify-content:center;
}
.lbb{
  height:40px;padding:0 22px;border-radius:12px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--f);border:none;transition:all .2s;
}
.lbb-dl{background:linear-gradient(135deg,var(--pu),var(--pi));color:#fff;box-shadow:0 0 20px var(--glow-p);}
.lbb-dl:hover{opacity:.9;transform:translateY(-1px);}
.lbb-nav{background:rgba(255,255,255,.08);color:var(--muted2);border:1px solid var(--border);}
.lbb-nav:hover{background:rgba(255,255,255,.14);color:#fff;}
.lb-star{
  width:40px;height:40px;background:rgba(255,255,255,.07);
  border:1px solid var(--border);border-radius:12px;
  font-size:17px;cursor:pointer;color:var(--muted);
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.lb-star:hover{background:rgba(168,85,247,.2);border-color:var(--pu);color:#c084fc;}
.lb-star.starred{background:rgba(168,85,247,.25);border-color:var(--pu);color:#c084fc;box-shadow:0 0 12px var(--glow-p);}
.lb-counter{
  position:absolute;top:24px;left:50%;transform:translateX(-50%);
  font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  padding:4px 12px;border-radius:100px;
}

/* FACE MODAL */
.face-ov{position:fixed;inset:0;background:rgba(8,8,14,.92);backdrop-filter:blur(20px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
.face-ov.hidden{display:none;}
.face-box{
  background:var(--s1);border:1px solid var(--border);
  border-radius:24px;padding:28px;width:100%;max-width:360px;text-align:center;
}
.face-box h3{font-size:18px;font-weight:700;margin-bottom:4px;}
.face-box p{font-size:12px;color:var(--muted);margin-bottom:16px;}
#face-video{width:100%;border-radius:14px;background:#000;display:block;aspect-ratio:4/3;object-fit:cover;}
#face-video.mirrored{transform:scaleX(-1);}
.face-status{font-size:12px;color:var(--muted);margin:10px 0 14px;}
.face-btns{display:flex;gap:8px;}
.face-btns button{
  flex:1;height:40px;border-radius:12px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--f);border:none;transition:all .2s;
}
.face-btns button:disabled{opacity:.35;cursor:not-allowed;}
.fbtn-cap{background:linear-gradient(135deg,var(--pu),var(--pi));color:#fff;}
.fbtn-flip{background:var(--s2);color:var(--muted2);border:1px solid var(--border);}
.fbtn-cls{background:transparent;color:var(--muted);border:1px solid var(--border);}
canvas#face-canvas{display:none;}

/* RATING */
.rating-wrap{max-width:1280px;margin:0 auto 60px;padding:0 24px;}
.rating-card{
  background:linear-gradient(135deg,rgba(168,85,247,.07),rgba(236,72,153,.05));
  border:1px solid rgba(168,85,247,.15);border-radius:24px;padding:32px;
}
.rating-card h3{font-size:20px;font-weight:700;margin-bottom:4px;}
.rating-card p{font-size:12px;color:var(--muted);margin-bottom:22px;}
.rstar-row{display:flex;gap:8px;margin-bottom:20px;}
.rstar-row span{font-size:28px;cursor:pointer;opacity:.2;transition:opacity .2s,transform .2s;}
.rstar-row span.lit{opacity:1;color:#f59e0b;}
.rstar-row span:hover{transform:scale(1.15);}
.rating-inp{
  width:100%;padding:11px 16px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-size:13px;font-family:var(--f);
  outline:none;margin-bottom:10px;transition:border-color .2s,box-shadow .2s;
}
.rating-inp:focus{border-color:rgba(168,85,247,.5);box-shadow:0 0 0 3px rgba(168,85,247,.1);}
.rating-inp::placeholder{color:var(--muted);}
.rating-ta{resize:none;min-height:70px;}
.rating-submit{
  height:40px;padding:0 28px;
  background:linear-gradient(135deg,var(--pu),var(--pi));
  border:none;border-radius:12px;color:#fff;font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--f);transition:all .2s;box-shadow:0 0 20px var(--glow-p);
}
.rating-submit:hover{opacity:.9;transform:translateY(-1px);}
.rating-done{
  background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);
  border-radius:14px;padding:20px;text-align:center;
  color:rgba(52,211,153,.9);font-size:14px;font-weight:500;
}

/* STATES */
.st{text-align:center;padding:80px 20px;}
.st-icon{font-size:36px;margin-bottom:14px;opacity:.4;}
.st p{font-size:13px;color:var(--muted);}
.spinner{
  width:22px;height:22px;margin:0 auto 14px;

// ─── LOAD ──────────────────────────────────────────────────

  // Client-level link: show all projects
  if(clientToken) return loadClientView(app);

          ${(profileData?.social_facebook||profileData?.social_instagram||profileData?.social_tiktok||profileData?.social_youtube)?`
          <div class="brand-socials">
            ${profileData.social_facebook?`<a class="soc-link" href="${profileData.social_facebook}" target="_blank" title="Facebook">f</a>`:''}
            ${profileData.social_instagram?`<a class="soc-link" href="${profileData.social_instagram}" target="_blank" title="Instagram">ig</a>`:''}
            ${profileData.social_tiktok?`<a class="soc-link" href="${profileData.social_tiktok}" target="_blank" title="TikTok">tt</a>`:''}
            ${profileData.social_youtube?`<a class="soc-link" href="${profileData.social_youtube}" target="_blank" title="YouTube">▶</a>`:''}
          </div>`:''}
        </div>
      </div>
      <div class="head-right">
        <button class="dl-star-btn" id="dl-starred-btn" onclick="dlStarred()" style="${starSet.size>0?'display:inline-block':'display:none'}">⭐ Download ດາວ (${starSet.size})</button>
        <button class="dl-all" id="dl-all-btn" onclick="dlAll()">⬇ Download ທັງໝົດ</button>
      </div>
    </header>
    <main>

      </div>
      <div class="ftabs" id="ftabs"></div>

// ─── CLIENT-LEVEL VIEW (all projects) ─────────────────────

  const {data:cl}=await sb.from('clients').select('id,uid,name,expires_at').eq('client_token',clientToken).single();
  if(!cl){app.innerHTML='<div class="st"><div class="st-icon">🔒</div><p>Link ບໍ່ຖືກຕ້ອງ</p></div>';return;}

  // Check expiry
  if(cl.expires_at&&new Date(cl.expires_at)<new Date()){
    app.innerHTML='<div class="st"><div class="st-icon">⏰</div><p>Link ໝົດກຳນົດແລ້ວ</p></div>';return;
  }

  studioUid=cl.uid;
  const {data:profileData}=await sb.from('profiles').select('studio_name,branding_logo,branding_color,branding_bio,social_facebook,social_instagram,social_tiktok,social_youtube').eq('id',cl.uid).single();
  const color=profileData?.branding_color||'#7c5cfc';
  document.documentElement.style.setProperty('--p',color);
  document.documentElement.style.setProperty('--grad',`linear-gradient(135deg,${color},#e05cfc)`);
  document.title=`${cl.name} — ${profileData?.studio_name||'SHARE LOD'}`;

  // Load all projects for this client
  const {data:projects}=await sb.from('projects').select('*').eq('client_id',cl.id).order('created_at',{ascending:false});
  if(!projects?.length){app.innerHTML='<div class="st"><div class="st-icon">📭</div><p>ຍັງບໍ່ທັນມີ Project</p></div>';return;}

  // Load all files across all projects
  const projIds=projects.map(p=>p.id);
  const {data:allFiles}=await sb.from('files').select('*').in('project_id',projIds).eq('share_enabled',true);
  files=(allFiles||[]).sort((a,b)=>(a.name||'').localeCompare(b.name||'',undefined,{numeric:true,sensitivity:'base'}));

  // Load stars
  await loadStarsClient();

  app.innerHTML=`
    <header>
      <div class="brand">
        <a href="studio.html?id=${studioUid}" target="_blank" title="ເບິ່ງ Portfolio ທັງໝົດ"
          style="position:relative;display:block;flex-shrink:0;text-decoration:none">
          <div class="brand-logo" style="background:linear-gradient(135deg,${color},#e05cfc)">${profileData?.branding_logo?`<img src="${profileData.branding_logo}">`:'📷'}</div>
          <span style="position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);background:rgba(168,85,247,.9);color:#fff;font-size:8px;padding:2px 5px;border-radius:4px;white-space:nowrap;pointer-events:none;font-family:var(--f)">Portfolio</span>
        </a>
        <div class="brand-info">
          <div class="brand-name">${profileData?.studio_name||'Studio'}</div>
          <div class="brand-bio">ສົ່ງໃຫ້ທ່ານຜ່ານ <span style="background:var(--aura);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:600">SHARE LOD</span></div>
          ${(profileData?.social_facebook||profileData?.social_instagram||profileData?.social_tiktok||profileData?.social_youtube)?`
          <div class="brand-socials">
            ${profileData.social_facebook?`<a class="soc-link" href="${profileData.social_facebook}" target="_blank" title="Facebook">f</a>`:''}
            ${profileData.social_instagram?`<a class="soc-link" href="${profileData.social_instagram}" target="_blank" title="Instagram">ig</a>`:''}
            ${profileData.social_tiktok?`<a class="soc-link" href="${profileData.social_tiktok}" target="_blank" title="TikTok">tt</a>`:''}
            ${profileData.social_youtube?`<a class="soc-link" href="${profileData.social_youtube}" target="_blank" title="YouTube">▶</a>`:''}
          </div>`:''}
        </div>
      </div>
      <div class="head-right">
        <button class="dl-star-btn" id="dl-starred-btn" onclick="dlStarred()" style="${starSet.size>0?'display:inline-block':'display:none'}">⭐ Download ດາວ</button>

    </header>
    <main>

          <span>📁 ${projects.length} Projects</span>

            <button class="vb on" id="vg" onclick="setView('grid')">⊞</button>
            <button class="vb" id="vl" onclick="setView('list')">☰</button>
          </div>
        </div>
      </div>
      <div id="gallery"></div>

  renderGallery();
  trackView();

async function loadStarsClient(){
  const {data}=await sb.from('photo_stars').select('file_id').eq('share_token',clientToken);
  starSet=new Set((data||[]).map(s=>s.file_id));
}

// Row 1: select project → show folder sub-tabs
let _selProjId=null;
window.selectProject=(projId,el)=>{
  _selProjId=projId;
  faceFilterIds=null;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const projLabel=projId?el.textContent.replace(/\s*\(\d+\)$/,'').trim():null;
  // Build folder sub-tabs
  const sub=document.getElementById('sub-ftabs');
  const pFiles=projId?files.filter(f=>f.project_id===projId):files;
  const folders=[...new Set(pFiles.map(f=>f.folder_name).filter(Boolean))];
  if(folders.length){
    sub.className='sub-ftabs show';
    sub.innerHTML=`<button class="sub-ftab on" onclick="selectFolder(null,this,'${(projLabel||'').replace(/'/g,"\\'")}')">ທັງໝົດ (${pFiles.length})</button>`
      +folders.map(fn=>`<button class="sub-ftab" onclick="selectFolder('${fn}',this,'${fn.replace(/'/g,"\\'")}')">📂 ${fn} (${pFiles.filter(f=>f.folder_name===fn).length})</button>`).join('');
  } else {
    sub.className='sub-ftabs';sub.innerHTML='';
  }
  applyClientFilter(projId,null,projLabel);
};
// Row 2: select folder within selected project
window.selectFolder=(folderName,el,label)=>{
  document.querySelectorAll('.sub-ftab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  applyClientFilter(_selProjId,folderName,label||folderName);
};
function applyClientFilter(projId,folderName,label){
  let f=files;
  if(projId) f=f.filter(x=>x.project_id===projId);
  if(folderName) f=f.filter(x=>x.folder_name===folderName);
  if(starFilterOn) f=f.filter(x=>starSet.has(x.id));
  if(searchQ) f=f.filter(x=>(x.name||'').toLowerCase().includes(searchQ.toLowerCase()));
  viewFiles=f;
  const cnt=document.getElementById('gal-count');
  if(cnt) cnt.textContent=`${viewFiles.length} ລາຍການ`;
  updateDlBtn(label,viewFiles.length);
  renderGalleryContent();
}
function updateDlBtn(label,count){
  const btn=document.getElementById('dl-all-btn');
  if(!btn) return;
  if(!label||label==='all') btn.textContent=`⬇ Download ທັງໝົດ (${count})`;
  else btn.textContent=`⬇ Download "${label}" (${count})`;
}

// ─── [3] STARS — per share_token ─────────────────────────
const starToken = clientToken||token; // use whichever is available
async function loadStars(){
  const {data}=await sb.from('photo_stars').select('file_id').eq('project_id',projId).eq('share_token',starToken);
  starSet=new Set((data||[]).map(s=>s.file_id));
}
window.toggleStar=async(fileId,btn)=>{
  const f=files.find(x=>x.id===fileId);
  if(starSet.has(fileId)){
    await sb.from('photo_stars').delete().eq('file_id',fileId).eq('share_token',starToken);
    starSet.delete(fileId);
    // Update all star buttons for this file
    document.querySelectorAll(`[data-star="${fileId}"]`).forEach(b=>{b.textContent='☆';b.classList.remove('starred');});
  }else{
    await sb.from('photo_stars').insert({file_id:fileId,project_id:f?.project_id||projId,studio_uid:f?.uid||studioUid,share_token:starToken});
    starSet.add(fileId);
    document.querySelectorAll(`[data-star="${fileId}"]`).forEach(b=>{b.textContent='★';b.classList.add('starred');});
    btn.style.animation='pop .25s ease';setTimeout(()=>btn.style.animation='',250);
  }
  updateStarUI();
};
function updateStarUI(){
  // update star-bar count
  const sbc=document.getElementById('star-bar-cnt');
  if(sbc) sbc.textContent=starSet.size;
  // update meta star link
  const smeta=document.getElementById('star-count-meta');
  if(smeta){
    if(starSet.size>0) smeta.innerHTML=`<a class="star-count-link" onclick="filterByStars()">⭐ ${starSet.size} ໝາຍດາວ</a>`;
    else smeta.innerHTML='';
  }

  const dsb=document.getElementById('dl-starred-btn');
  if(dsb){dsb.style.display=starSet.size>0?'inline-block':'none';dsb.textContent=`⭐ Download ດາວ (${starSet.size})`;}
  if(starFilterOn) renderGallery();
}
window.filterByStars=()=>{starFilterOn=true;document.getElementById('star-bar').classList.remove('hidden');renderGallery();};
window.clearStarFilter=()=>{starFilterOn=false;document.getElementById('star-bar').classList.add('hidden');renderGallery();};

// ─── LIGHTBOX STAR ─────────────────────────────────────────
window.lbToggleStar=()=>{

// ─── FOLDER TABS ───────────────────────────────────────────
function renderFolderTabs(){

window.setFolder=(folder,el)=>{
  activeFolder=folder;faceFilterIds=null;

// ─── GALLERY ───────────────────────────────────────────────
function getFiltered(){
  let f=files;
  if(activeFolder) f=f.filter(x=>x.folder_name===activeFolder);
  if(faceFilterIds) f=f.filter(x=>faceFilterIds.has(x.id));
  if(starFilterOn) f=f.filter(x=>starSet.has(x.id));
  if(searchQ){const q=searchQ.toLowerCase();f=f.filter(x=>(x.name||'').toLowerCase().includes(q)||(x.folder_name||'').toLowerCase().includes(q));}
  return f;
}
window.setView=mode=>{view=mode;document.getElementById('vg').classList.toggle('on',mode==='grid');document.getElementById('vl').classList.toggle('on',mode==='list');renderGallery();};
window.onSearch=q=>{searchQ=q;document.getElementById('search-cls').style.display=q?'block':'none';renderGallery();};
window.clearSearch=()=>{searchQ='';document.getElementById('search-input').value='';document.getElementById('search-cls').style.display='none';renderGallery();};

function renderGallery(){
  viewFiles=getFiltered();
  const cnt=document.getElementById('gal-count');
  if(cnt) cnt.textContent=`${viewFiles.length} ລາຍການ`;

  const folderLabel=activeFolder||null;
  updateDlBtn(folderLabel,viewFiles.length);
  renderGalleryContent();
}

      <div class="li-row" onclick="openLb(${i})">

// ─── LIGHTBOX ──────────────────────────────────────────────
window.openLb=i=>{lbIdx=i;updLb();document.getElementById('lb').classList.remove('hidden');};
window.closeLb=()=>document.getElementById('lb').classList.add('hidden');
window.navLb=d=>{lbIdx=Math.max(0,Math.min(viewFiles.length-1,lbIdx+d));updLb();};
function updLb(){

  const b=document.getElementById('lb-body');
  if(f.mime_type?.startsWith('image'))b.innerHTML=`<img src="${f.url}" alt="${f.name}">`;

  else b.innerHTML=`<div style="color:rgba(255,255,255,.5);text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px;opacity:.3">◻</div><p style="font-size:12px;letter-spacing:1px">${f.name}</p></div>`;

// ─── [2] FACE SEARCH — camera flip + mirror fix ───────────
window.openFaceModal=()=>{
  if(!faceReady){alert('AI ກຳລັງໂຫຼດ... ລໍຖ້າ 30 ວິ');return;}
  document.getElementById('face-modal').classList.remove('hidden');
  startCamera();
};
async function startCamera(){
  if(faceStream){faceStream.getTracks().forEach(t=>t.stop());faceStream=null;}
  document.getElementById('face-status').textContent='ກຳລັງເປີດ Camera...';
  document.getElementById('btn-cap').disabled=true;
  document.getElementById('btn-flip').disabled=true;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode}});
    faceStream=stream;
    const vid=document.getElementById('face-video');
    vid.srcObject=stream;
    // Mirror front camera for natural selfie feel; back camera shows reality
    vid.className=facingMode==='user'?'mirrored':'';
    document.getElementById('face-status').textContent='📸 ຈ້ອງກ້ອງ ແລ້ວກົດຖ່າຍ';
    document.getElementById('btn-cap').disabled=false;
    document.getElementById('btn-flip').disabled=false;
  }catch(e){
    document.getElementById('face-status').textContent='❌ ເປີດ Camera ບໍ່ໄດ້';
  }
}
window.flipCamera=async()=>{
  facingMode=facingMode==='user'?'environment':'user';
  await startCamera();
};
window.closeFaceModal=()=>{
  if(faceStream){faceStream.getTracks().forEach(t=>t.stop());faceStream=null;}
  document.getElementById('face-modal').classList.add('hidden');
};
window.captureAndSearch=async()=>{
  const vid=document.getElementById('face-video');
  const canvas=document.getElementById('face-canvas');
  // Capture at full resolution for better accuracy
  canvas.width=vid.videoWidth;canvas.height=vid.videoHeight;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(vid,0,0);
  document.getElementById('face-status').textContent='🔍 ກຳລັງວິເຄາະ...';
  document.getElementById('btn-cap').disabled=true;
  try{
    // Use SsdMobilenetv1 — ແມ່ນຍຳກວ່າ TinyFace, minConfidence 0.5
    const detOpts=new faceapi.SsdMobilenetv1Options({minConfidence:0.5});
    // Detect all faces in capture and pick the largest/most confident one
    const dets=await faceapi.detectAllFaces(canvas,detOpts).withFaceLandmarks().withFaceDescriptors();
    if(!dets.length){document.getElementById('face-status').textContent='😕 ບໍ່ພົບໜ້າ — ລອງໃໝ່';document.getElementById('btn-cap').disabled=false;return;}
    // Pick the face with the largest bounding box (closest to camera = main subject)
    const det=dets.reduce((a,b)=>
      (a.detection.box.area>b.detection.box.area)?a:b
    );
    const ref=det.descriptor;
    // Threshold 0.45 = ເຄັ່ງກວ່າ (ແມ່ນຍຳກວ່າ), 0.6 = ຜ່ອນຄາຍ
    const THRESHOLD=0.45;
    const matches=files.filter(f=>{
      if(!f.face_descriptor||!f.mime_type?.startsWith('image'))return false;
      try{
        const raw=Array.isArray(f.face_descriptor)?f.face_descriptor:Object.values(f.face_descriptor);
        const stored=new Float32Array(raw);
        return faceapi.euclideanDistance(stored,ref)<THRESHOLD;
      }catch(e){return false;}
    });
    closeFaceModal();
    faceFilterIds=new Set(matches.map(f=>f.id));
    activeFolder=null;
    document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
    const bar=document.getElementById('face-bar');bar.classList.remove('hidden');
    document.getElementById('face-bar-txt').textContent=`📷 ພົບ ${matches.length} ຮູບທີ່ມີໜ້າຂອງທ່ານ`;
    renderGallery();
  }catch(e){document.getElementById('face-status').textContent='❌ '+e.message;document.getElementById('btn-cap').disabled=false;}
};
window.clearFaceSearch=()=>{faceFilterIds=null;document.getElementById('face-bar').classList.add('hidden');renderGallery();};


// ─── [4+5] DOWNLOAD — folder-aware + iOS Photos ───────────
const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent)&&!window.MSStream;
window.dlFile=async(url,name)=>{
  try{
    const r=await fetch(url);
    const blob=await r.blob();
    // [5] iOS: use Web Share API → saves to Photos app
    if(isIOS&&navigator.share&&navigator.canShare){
      const file=new File([blob],name,{type:blob.type});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:name});
        return;
      }
    }
    // Other: create blob URL and trigger download
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  }catch(e){
    window.open(url,'_blank');
  }
};
// [4] Download only current view (respects folder/star/face filter)
window.dlAll=()=>{
  if(!viewFiles.length)return;
  viewFiles.forEach((f,i)=>setTimeout(()=>dlFile(f.url,f.name),i*800));
};
// [4] Download only starred files
window.dlStarred=()=>{
  const starred=files.filter(f=>starSet.has(f.id));
  if(!starred.length){alert('ຍັງບໍ່ທັນໝາຍດາວຮູບໃດ');return;}
  starred.forEach((f,i)=>setTimeout(()=>dlFile(f.url,f.name),i*800));
};

// ─── LONG PRESS + SELECTION ────────────────────────────
let _lpEl=null, _lpStartX=0, _lpStartY=0;

window.lpStart=(e,fileId)=>{
  // Ignore if star button or dl button
  if(e.target.closest('.gi-star-corner,.dl-btn,.star-btn')) return;
  lpFired=false;
  _lpEl=e.currentTarget;
  // Record start position to detect scroll
  const t=e.touches?e.touches[0]:e;
  _lpStartX=t.clientX; _lpStartY=t.clientY;
  lpTimer=setTimeout(()=>{
    lpFired=true;
    navigator.vibrate&&navigator.vibrate(40);
    _lpEl&&_lpEl.classList.remove('pressing');
    enterSelMode(fileId);
  },500);
  _lpEl.classList.add('pressing');
};
window.lpMove=(e)=>{
  if(!lpTimer) return;
  const t=e.touches?e.touches[0]:e;
  const dx=Math.abs(t.clientX-_lpStartX), dy=Math.abs(t.clientY-_lpStartY);
  if(dx>10||dy>10){ // ຖ້າ scroll — cancel long press
    clearTimeout(lpTimer);lpTimer=null;
    _lpEl&&_lpEl.classList.remove('pressing');
  }
};
window.lpEnd=(e)=>{
  clearTimeout(lpTimer);lpTimer=null;
  _lpEl&&_lpEl.classList.remove('pressing');
  _lpEl=null;
};
window.onGiClick=(e,idx,fileId)=>{
  if(lpFired){lpFired=false;return;} // was long press — ignore click
  if(selMode){e.stopPropagation();toggleSel(fileId);return;}
  openLb(idx);
};
function enterSelMode(fileId){
  selMode=true;
  selSet.clear();
  selSet.add(fileId);
  updSelBar();
  renderGalleryContent();
}
window.exitSelMode=()=>{
  selMode=false;selSet.clear();
  updSelBar();renderGalleryContent();
};
function toggleSel(fileId){
  if(selSet.has(fileId)) selSet.delete(fileId);
  else selSet.add(fileId);
  if(selSet.size===0) exitSelMode();
  else{updSelBar();renderGalleryContent();}
}
function updSelBar(){
  const bar=document.getElementById('sel-bar');
  const num=document.getElementById('sel-num');
  if(!bar)return;
  bar.classList.toggle('show',selMode&&selSet.size>0);
  if(num) num.textContent=selSet.size;
}
window.dlSelected=()=>{
  const toDown=files.filter(f=>selSet.has(f.id));
  toDown.forEach((f,i)=>setTimeout(()=>dlFile(f.url,f.name),i*600));
  exitSelMode();
};
