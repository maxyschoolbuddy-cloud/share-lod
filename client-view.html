<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHARE LOD — ເບິ່ງຟາຍ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--surface:#0f0f1a;--card:#13131f;--border:rgba(255,255,255,0.06);--text:#f0eff8;--muted:#7a79a0;--p:#7c5cfc;--grad:linear-gradient(135deg,#7c5cfc,#e05cfc);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans Lao','DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.orb1{width:400px;height:400px;background:rgba(124,92,252,.1);top:-100px;right:-100px;}
header{padding:20px 36px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;background:rgba(8,8,16,.88);backdrop-filter:blur(20px);}
.brand{display:flex;align-items:center;gap:14px;}
.brand-logo{width:44px;height:44px;border-radius:11px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;}
.brand-logo img{width:100%;height:100%;object-fit:cover;}
.brand-name{font-family:'Noto Sans Lao','DM Sans',sans-serif;font-size:19px;font-weight:700;}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.head-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.dl-all{padding:9px 20px;background:var(--grad);border:none;border-radius:100px;color:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans Lao','DM Sans',sans-serif;transition:opacity .2s;}
.dl-all:hover{opacity:.85;}
.dl-star-btn{padding:9px 18px;background:rgba(245,200,66,.12);border:1px solid rgba(245,200,66,.25);border-radius:100px;color:#f5c842;font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans Lao','DM Sans',sans-serif;display:none;}
main{max-width:1200px;margin:0 auto;padding:32px 28px;position:relative;z-index:1;}
.proj-info{margin-bottom:22px;}
.proj-title{font-family:'Noto Sans Lao','DM Sans',sans-serif;font-size:28px;font-weight:700;margin-bottom:7px;}
.proj-meta{display:flex;gap:16px;font-size:12px;color:var(--muted);flex-wrap:wrap;align-items:center;}
.star-count-link{color:#f5c842;cursor:pointer;text-decoration:none;font-weight:600;}
.star-count-link:hover{text-decoration:underline;}
.bio{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:22px;font-size:13px;color:var(--muted);line-height:1.7;}
/* EXPIRY BANNER */
.exp-banner{border-radius:12px;padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.exp-banner.warn{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.2);}
.exp-banner.danger{background:rgba(255,80,80,.07);border:1px solid rgba(255,80,80,.2);}
.exp-banner h4{font-size:12px;font-weight:600;}
.exp-banner.warn h4{color:#f5c842;}.exp-banner.danger h4{color:#ff6060;}
.exp-banner p{font-size:11px;color:var(--muted);margin-top:1px;}
/* SEARCH + FILTER */
.search-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.search-input{flex:1;padding:9px 14px;background:var(--card);border:1px solid var(--border);border-radius:100px;color:var(--text);font-size:13px;font-family:'Noto Sans Lao','DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:rgba(124,92,252,.4);}
.search-input::placeholder{color:var(--muted);}
.search-cls{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:3px;}
/* STAR FILTER BAR */
.star-bar{background:rgba(245,200,66,.06);border:1px solid rgba(245,200,66,.15);border-radius:10px;padding:9px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;font-size:12px;}
.star-bar.hidden{display:none;}
.star-bar-cls{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;font-family:'Noto Sans Lao','DM Sans',sans-serif;}
/* TABS */
.ftabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.ftab{padding:7px 16px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans Lao','DM Sans',sans-serif;transition:all .2s;}
.ftab:hover{border-color:rgba(124,92,252,.3);color:var(--text);}
.ftab.on{background:var(--grad);border-color:transparent;color:#fff;}
/* FOLDER SUB-TABS */
.sub-ftabs{display:none;gap:5px;flex-wrap:wrap;margin-bottom:14px;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--border);}
.sub-ftabs.show{display:flex;}
.sub-ftab{padding:5px 13px;border-radius:100px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans Lao','DM Sans',sans-serif;transition:all .2s;}
.sub-ftab:hover{border-color:rgba(124,92,252,.3);color:var(--text);}
.sub-ftab.on{background:rgba(124,92,252,.2);border-color:rgba(124,92,252,.4);color:#fff;}
/* FACE BAR */
.face-bar{background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.2);border-radius:10px;padding:9px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;font-size:12px;}
.face-bar.hidden{display:none;}
.face-bar-cls{background:none;border:none;color:var(--p);cursor:pointer;font-size:11px;font-family:'Noto Sans Lao','DM Sans',sans-serif;}
/* GALLERY TOP */
.gallery-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.gallery-top-right{display:flex;align-items:center;gap:7px;}
.face-btn{padding:7px 14px;border-radius:100px;background:rgba(124,92,252,.12);border:1px solid rgba(124,92,252,.2);color:var(--p);font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans Lao','DM Sans',sans-serif;transition:all .2s;}
.face-btn:hover{background:rgba(124,92,252,.22);}
.face-btn.loading{opacity:.5;cursor:not-allowed;}
.vt{display:flex;gap:3px;background:var(--surface);border-radius:8px;padding:3px;}
.vb{padding:6px 10px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:14px;color:var(--muted);transition:all .2s;}
.vb.on{background:var(--card);color:var(--text);}
.ct{font-size:12px;color:var(--muted);}
/* GRID */
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.gl{display:flex;flex-direction:column;gap:6px;}
.gi{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;}
.gi:hover{border-color:rgba(124,92,252,.4);transform:translateY(-2px);}
.gi img,.gi video{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.gi-ph{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:36px;background:rgba(255,255,255,.03);}
.gi-foot{padding:8px 10px;display:flex;align-items:center;gap:5px;}
.gi-info{flex:1;min-width:0;}
.gi-folder{font-size:10px;color:var(--p);}
.gi-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* STAR BUTTON */
.star-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:3px;line-height:1;transition:transform .15s;flex-shrink:0;color:#f5c842;}
.star-btn:hover{transform:scale(1.3);}
.dl-btn{padding:3px 8px;border-radius:6px;background:rgba(124,92,252,.15);border:1px solid rgba(124,92,252,.2);color:var(--p);font-size:11px;cursor:pointer;font-family:'Noto Sans Lao','DM Sans',sans-serif;flex-shrink:0;}
/* LIST */
.li-row{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .2s;}
.li-row:hover{border-color:rgba(124,92,252,.3);}
.li-th{width:38px;height:38px;border-radius:7px;flex-shrink:0;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;}
.li-th img{width:100%;height:100%;object-fit:cover;}
.li-info{flex:1;min-width:0;}
.li-name{font-size:13px;font-weight:500;}
.li-folder{font-size:10px;color:var(--p);}
.li-sz{font-size:11px;color:var(--muted);margin-right:8px;flex-shrink:0;}
/* LIGHTBOX */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.lb.hidden{display:none;}
.lb-x{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;}
.lb img,.lb video{max-width:90vw;max-height:85vh;border-radius:10px;object-fit:contain;}
.lb-foot{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
.lbb{padding:8px 20px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans Lao','DM Sans',sans-serif;border:none;}
.lbb-dl{background:var(--grad);color:#fff;}
.lbb-nav{background:rgba(255,255,255,.1);color:#fff;}
.lb-star{background:none;border:none;font-size:22px;cursor:pointer;padding:6px;transition:transform .15s;}
.lb-star:hover{transform:scale(1.2);}
/* FACE MODAL */
.face-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
.face-ov.hidden{display:none;}
.face-box{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:28px;width:100%;max-width:380px;text-align:center;}
.face-box h3{font-family:'Noto Sans Lao','DM Sans',sans-serif;font-size:18px;font-weight:700;margin-bottom:5px;}
.face-box p{font-size:12px;color:var(--muted);margin-bottom:14px;}
#face-video{width:100%;border-radius:12px;background:#000;display:block;aspect-ratio:4/3;object-fit:cover;}
#face-video.mirrored{transform:scaleX(-1);}
.face-status{font-size:12px;color:var(--muted);margin:8px 0 12px;}
.face-btns{display:flex;gap:8px;flex-wrap:wrap;}
.face-btns button{flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans Lao','DM Sans',sans-serif;border:none;min-width:80px;}
.face-btns button:disabled{opacity:.4;cursor:not-allowed;}
.fbtn-cap{background:var(--grad);color:#fff;}
.fbtn-flip{background:rgba(255,255,255,.07);color:var(--text);}
.fbtn-cls{background:rgba(255,255,255,.07);color:var(--muted);}
canvas#face-canvas{display:none;}
/* RATING SECTION */
.rating-wrap{max-width:1200px;margin:0 auto 40px;padding:0 28px;position:relative;z-index:1;}
.rating-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px 28px;}
.rating-card h3{font-family:'Noto Sans Lao','DM Sans',sans-serif;font-size:18px;font-weight:800;margin-bottom:4px;}
.rating-card p{font-size:12px;color:var(--muted);margin-bottom:18px;}
.rstar-row{display:flex;gap:10px;margin-bottom:16px;justify-content:center;}
.rstar-row span{font-size:36px;cursor:pointer;transition:transform .15s;line-height:1;}
.rstar-row span:hover{transform:scale(1.15);}
.rating-inp{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:'Noto Sans Lao','DM Sans',sans-serif;outline:none;margin-bottom:10px;}
.rating-inp:focus{border-color:rgba(124,92,252,.4);}
.rating-inp::placeholder{color:var(--muted);}
.rating-ta{resize:vertical;min-height:65px;}
.rating-submit{padding:10px 28px;background:var(--grad);border:none;border-radius:100px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans Lao','DM Sans',sans-serif;}
.rating-done{background:rgba(128,255,160,.08);border:1px solid rgba(128,255,160,.2);border-radius:12px;padding:16px;text-align:center;color:#80ffaa;font-size:14px;}
/* STATES */
.st{text-align:center;padding:60px 20px;}
.st-icon{font-size:44px;margin-bottom:12px;}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
footer{text-align:center;padding:24px;font-size:11px;color:var(--muted);}
@media(max-width:600px){header{padding:14px;flex-wrap:wrap;gap:10px;}main{padding:18px 14px;}.gg{grid-template-columns:repeat(2,1fr);}.gallery-top{flex-direction:column;align-items:flex-start;gap:8px;}.chat-win{width:calc(100vw - 32px);right:16px;}.rating-wrap{padding:0 14px;}}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div id="app"><div class="st"><div class="spinner"></div><p style="color:var(--muted)">ກຳລັງໂຫຼດ...</p></div></div>

<!-- LIGHTBOX -->
<div class="lb hidden" id="lb">
  <button class="lb-x" onclick="closeLb()">✕</button>
  <div id="lb-body"></div>
  <div class="lb-foot">
    <button class="lbb lbb-nav" onclick="navLb(-1)">← ກ່ອນ</button>
    <button class="lb-star" id="lb-star" onclick="lbToggleStar()" title="ໝາຍດາວ">☆</button>
    <button class="lbb lbb-dl" id="lb-dl" onclick="dlFile(this.dataset.url,this.dataset.name)">⬇ Download</button>
    <button class="lbb lbb-nav" onclick="navLb(1)">ຕໍ່ໄປ →</button>
  </div>
</div>

<!-- FACE MODAL -->
<div class="face-ov hidden" id="face-modal">
  <div class="face-box">
    <h3>🤳 ຄົ້ນຫາດ້ວຍໃບໜ້າ</h3>
    <p>ຈ້ອງກ້ອງ ແລ້ວກົດຖ່າຍ</p>
    <video id="face-video" autoplay muted playsinline></video>
    <div class="face-status" id="face-status">ກຳລັງເປີດ Camera...</div>
    <canvas id="face-canvas"></canvas>
    <div class="face-btns">
      <button class="fbtn-flip" id="btn-flip" onclick="flipCamera()" disabled>🔄 ສະລັບ</button>
      <button class="fbtn-cap" id="btn-cap" onclick="captureAndSearch()" disabled>📸 ຖ່າຍ & ຊອກ</button>
      <button class="fbtn-cls" onclick="closeFaceModal()">ຍົກເລີກ</button>
    </div>
  </div>
</div>


<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import * as faceapi from 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.esm.js';

const sb = createClient('https://vuhjmwnxbvzppcoklgir.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1aGptd254YnZ6cHBjb2tsZ2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTM2NzAsImV4cCI6MjA5MDU2OTY3MH0.ijlH_tjBZm4irxrq-FXfIKIKdwZJTdTzaYbTPrpd928');

const params = new URLSearchParams(location.search);
const token = params.get('token'), projId = params.get('project');
const clientToken = params.get('client'); // NEW: client-level link
let files=[], lbIdx=0, view='grid', activeFolder=null, faceFilterIds=null;
let faceStream=null, faceReady=false, viewFiles=[], searchQ='';
let starSet=new Set(), starFilterOn=false;
let studioUid=null, studioProfile=null;
const sessKey=localStorage.getItem('slod_sess')||Math.random().toString(36).slice(2);
localStorage.setItem('slod_sess',sessKey);

// Camera state
let facingMode='user'; // 'user' = front, 'environment' = back

function fmt(b){if(b<1048576)return(b/1024).toFixed(1)+' KB';if(b<1073741824)return(b/1048576).toFixed(1)+' MB';return(b/1073741824).toFixed(2)+' GB';}

// ── [1] Face AI — Load models ─────────────────────────────
const MODEL_URL='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
(async()=>{
  try{
    await Promise.all([
      faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),      // ແມ່ນຍຳກວ່າ tiny
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),    // full landmarks
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    ]);
    faceReady=true;
    const b=document.getElementById('face-search-btn');
    if(b){b.classList.remove('loading');b.textContent='📷 ຄົ້ນຫາດ້ວຍໃບໜ້າ';}
  }catch(e){console.error('Face AI load error:',e);}
})();

// ─── LOAD ──────────────────────────────────────────────────
async function load(){
  const app=document.getElementById('app');
  // Client-level link: show all projects
  if(clientToken) return loadClientView(app);
  if(!token||!projId){app.innerHTML='<div class="st"><div class="st-icon">🔒</div><p>Link ບໍ່ຖືກຕ້ອງ</p></div>';return;}

  const [{data:proj}]=await Promise.all([
    sb.from('projects').select('*').eq('id',projId).single()
  ]);
  if(!proj){app.innerHTML='<div class="st"><div class="st-icon">❌</div><p>ບໍ່ພົບ Project</p></div>';return;}

  const {data:profileData}=await sb.from('profiles').select('studio_name,branding_logo,branding_color,branding_bio,id').eq('id',proj.uid).single();
  studioProfile=profileData;
  studioUid=proj.uid;
  const color=profileData?.branding_color||'#7c5cfc';
  document.documentElement.style.setProperty('--p',color);
  document.documentElement.style.setProperty('--grad',`linear-gradient(135deg,${color},#e05cfc)`);

  // Token check
  const {data:tokenCheck}=await sb.from('files').select('id').eq('project_id',projId).eq('share_token',token).limit(1);
  if(!tokenCheck?.length){app.innerHTML='<div class="st"><div class="st-icon">🔒</div><p>Link ບໍ່ຖືກຕ້ອງ ຫຼື ໝົດອາຍຸ</p></div>';return;}

  // Load files
  const {data:fdata}=await sb.from('files').select('*').eq('project_id',projId).eq('share_enabled',true);
  // Natural sort: A→Z + ຕົວເລກ (1,2,3...10,11 ບໍ່ແມ່ນ 1,10,11,2)
  files=(fdata||[]).sort((a,b)=>
    (a.name||'').localeCompare(b.name||'',undefined,{numeric:true,sensitivity:'base'})
  );

  // [3] Load stars — per share_token (per client link)
  await loadStars();

  // Client expiry
  const {data:clientData}=await sb.from('clients').select('expires_at').eq('id',proj.client_id).maybeSingle();

  document.title=`${proj.name} — ${profileData?.studio_name||'SHARE LOD'}`;


  // Build expiry banner
  let expiryHtml='';
  if(clientData?.expires_at){
    const days=Math.ceil((new Date(clientData.expires_at)-new Date())/(1000*60*60*24));
    const expStr=new Date(clientData.expires_at).toLocaleDateString('lo-LA');
    if(days<=0)expiryHtml=`<div class="exp-banner danger"><span style="font-size:20px">🗑</span><div><h4>Link ນີ້ໝົດກຳນົດແລ້ວ</h4><p>ຂໍ້ມູນຖືກລຶບໂດຍ Studio</p></div></div>`;
    else if(days<=7)expiryHtml=`<div class="exp-banner ${days<=3?'danger':'warn'}"><span style="font-size:20px">${days<=3?'🚨':'⚠️'}</span><div><h4>Link ໝົດໃນ ${days} ວັນ!</h4><p>ກ່ອນ ${expStr} — ກະລຸນາ Download ຮູບໃຫ້ຄົບ</p></div></div>`;
  }

  // [4] star count clickable to filter + dl-starred-btn
  const starCountHtml=starSet.size>0
    ?`<a class="star-count-link" onclick="filterByStars()">⭐ ${starSet.size} ໝາຍດາວ</a>`
    :'';

  app.innerHTML=`
    <header>
      <div class="brand">
        <div class="brand-logo" style="background:linear-gradient(135deg,${color},#e05cfc)">${profileData?.branding_logo?`<img src="${profileData.branding_logo}">`:'📷'}</div>
        <div><div class="brand-name">${profileData?.studio_name||'Studio'}</div><div class="brand-sub">ສົ່ງໃຫ້ທ່ານດ້ວຍ SHARE LOD</div></div>
      </div>
      <div class="head-right">
        <button class="dl-star-btn" id="dl-starred-btn" onclick="dlStarred()" style="${starSet.size>0?'display:inline-block':'display:none'}">⭐ Download ດາວ (${starSet.size})</button>

window.openFaceModal=()=>{

async function startCamera(){
  if(faceStream){faceStream.getTracks().forEach(t=>t.stop());faceStream=null;}
  document.getElementById('face-status').textContent='ກຳລັງເປີດ Camera...';
  document.getElementById('btn-cap').disabled=true;
  document.getElementById('btn-flip').disabled=true;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode}});
    faceStream=stream;
    const vid=document.getElementById('face-video');
    vid.srcObject=stream;
    // Mirror front camera for natural selfie feel; back camera shows reality
    vid.className=facingMode==='user'?'mirrored':'';
    document.getElementById('face-status').textContent='📸 ຈ້ອງກ້ອງ ແລ້ວກົດຖ່າຍ';
    document.getElementById('btn-cap').disabled=false;
    document.getElementById('btn-flip').disabled=false;
  }catch(e){
    document.getElementById('face-status').textContent='❌ ເປີດ Camera ບໍ່ໄດ້';
  }
}
window.flipCamera=async()=>{
  facingMode=facingMode==='user'?'environment':'user';
  await startCamera();
};
window.closeFaceModal=()=>{
  if(faceStream){faceStream.getTracks().forEach(t=>t.stop());faceStream=null;}
  document.getElementById('face-modal').classList.add('hidden');
};
window.captureAndSearch=async()=>{
  const vid=document.getElementById('face-video');
  const canvas=document.getElementById('face-canvas');
  // Capture at full resolution for better accuracy
  canvas.width=vid.videoWidth;canvas.height=vid.videoHeight;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(vid,0,0);
  document.getElementById('face-status').textContent='🔍 ກຳລັງວິເຄາະ...';
  document.getElementById('btn-cap').disabled=true;
  try{
    // Use SsdMobilenetv1 — ແມ່ນຍຳກວ່າ TinyFace, minConfidence 0.5
    const detOpts=new faceapi.SsdMobilenetv1Options({minConfidence:0.5});
    // Detect all faces in capture and pick the largest/most confident one
    const dets=await faceapi.detectAllFaces(canvas,detOpts).withFaceLandmarks().withFaceDescriptors();
    if(!dets.length){document.getElementById('face-status').textContent='😕 ບໍ່ພົບໜ້າ — ລອງໃໝ່';document.getElementById('btn-cap').disabled=false;return;}
    // Pick the face with the largest bounding box (closest to camera = main subject)
    const det=dets.reduce((a,b)=>
      (a.detection.box.area>b.detection.box.area)?a:b
    );
    const ref=det.descriptor;
    // Threshold 0.45 = ເຄັ່ງກວ່າ (ແມ່ນຍຳກວ່າ), 0.6 = ຜ່ອນຄາຍ
    const THRESHOLD=0.45;
    const matches=files.filter(f=>{
      if(!f.face_descriptor||!f.mime_type?.startsWith('image'))return false;
      try{
        const raw=Array.isArray(f.face_descriptor)?f.face_descriptor:Object.values(f.face_descriptor);
        const stored=new Float32Array(raw);
        return faceapi.euclideanDistance(stored,ref)<THRESHOLD;
      }catch(e){return false;}
    });
    closeFaceModal();
    faceFilterIds=new Set(matches.map(f=>f.id));
    activeFolder=null;
    document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
    const bar=document.getElementById('face-bar');bar.classList.remove('hidden');
    document.getElementById('face-bar-txt').textContent=`📷 ພົບ ${matches.length} ຮູບທີ່ມີໜ້າຂອງທ່ານ`;
    renderGallery();
  }catch(e){document.getElementById('face-status').textContent='❌ '+e.message;document.getElementById('btn-cap').disabled=false;}
};
window.clearFaceSearch=()=>{faceFilterIds=null;document.getElementById('face-bar').classList.add('hidden');renderGallery();};


// ─── [4+5] DOWNLOAD — folder-aware + iOS Photos ───────────
const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent)&&!window.MSStream;
window.dlFile=async(url,name)=>{
  try{
    const r=await fetch(url);
    const blob=await r.blob();
    // [5] iOS: use Web Share API → saves to Photos app
    if(isIOS&&navigator.share&&navigator.canShare){
      const file=new File([blob],name,{type:blob.type});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:name});
        return;
      }
    }
    // Other: create blob URL and trigger download
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  }catch(e){
    window.open(url,'_blank');
  }
};
// [4] Download only current view (respects folder/star/face filter)
window.dlAll=()=>{
  if(!viewFiles.length)return;
  viewFiles.forEach((f,i)=>setTimeout(()=>dlFile(f.url,f.name),i*800));
};
// [4] Download only starred files
window.dlStarred=()=>{
  const starred=files.filter(f=>starSet.has(f.id));
  if(!starred.length){alert('ຍັງບໍ່ທັນໝາຍດາວຮູບໃດ');return;}
  starred.forEach((f,i)=>setTimeout(()=>dlFile(f.url,f.name),i*800));
};

// ─── UTILS ─────────────────────────────────────────────────
async function trackView(){
  if(!studioUid)return;
  try{await sb.from('gallery_views').insert({project_id:projId,studio_uid:studioUid});}catch(e){}
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('hidden')){
    if(e.key==='Escape')closeLb();if(e.key==='ArrowLeft')navLb(-1);if(e.key==='ArrowRight')navLb(1);if(e.key==='s')lbToggleStar();
  }else if(e.key==='Escape')closeFaceModal();
});

// ─── [6] RATING SYSTEM ─────────────────────────────────────
let selRating=0;
const ratingKey=`rated_${projId}_${token}`;

async function renderRatingSection(){
  // Check if already rated
  const {data:existing}=await sb.from('ratings').select('id,score,comment').eq('share_token',token).eq('project_id',projId).maybeSingle();

  const wrap=document.createElement('div');
  wrap.className='rating-wrap';

  if(existing){
    wrap.innerHTML=`
      <div class="rating-card">
        <h3>⭐ ຂອບໃຈສຳລັບ Review!</h3>
        <p style="font-size:13px;color:var(--muted)">ທ່ານໃຫ້ ${'★'.repeat(existing.score)+'☆'.repeat(5-existing.score)} ${existing.comment?`— "${existing.comment}"`:''}
        </p>
      </div>`;
  } else {
    wrap.innerHTML=`
      <div class="rating-card">
        <h3>⭐ ໃຫ້ຄະແນນການບໍລິການ</h3>
        <p>ຊ່ວຍ Studio ປັບປຸງໄດ້ດ້ວຍ Review ຂອງທ່ານ</p>
        <div class="rstar-row" id="rstar-row">
          ${[1,2,3,4,5].map(n=>`<span id="rs${n}" onclick="setRatingStar(${n})">☆</span>`).join('')}
        </div>
        <input class="rating-inp" id="r-name" placeholder="ຊື່ຂອງທ່ານ *">
        <textarea class="rating-inp rating-ta" id="r-comment" placeholder="ຄຳເຫັນ (ທາງເລືອກ)..."></textarea>
        <button class="rating-submit" onclick="submitRating()">ສົ່ງ Review</button>
        <span id="r-msg" style="font-size:12px;margin-left:10px;display:none"></span>
      </div>`;
  }

  wrap.innerHTML += `<footer>ສ່ວນໜຶ່ງຂອງ SHARE LOD · ລະບົບຝາກຟາຍສຳລັບຊ່າງພາບ</footer>`;
  document.getElementById('app').appendChild(wrap);
}

window.setRatingStar=n=>{
  selRating=n;
  [1,2,3,4,5].forEach(i=>{const el=document.getElementById('rs'+i);if(el)el.textContent=i<=n?'★':'☆';});
};

window.submitRating=async()=>{
  const name=document.getElementById('r-name')?.value.trim();
  const comment=document.getElementById('r-comment')?.value.trim();
  const msg=document.getElementById('r-msg');
  if(!selRating){msg.textContent='⚠️ ເລືອກຄະແນນດາວ';msg.style.color='#f5c842';msg.style.display='inline';return;}
  if(!name){msg.textContent='⚠️ ໃສ່ຊື່ຂອງທ່ານ';msg.style.color='#f5c842';msg.style.display='inline';return;}
  msg.textContent='ກຳລັງສົ່ງ...';msg.style.color='var(--muted)';msg.style.display='inline';
  const {error}=await sb.from('ratings').insert({
    studio_uid:studioUid,
    project_id:projId,
    share_token:token,
    score:selRating,
    reviewer_name:name,
    comment:comment||null
  });
  if(error){msg.textContent='❌ ຜິດພາດ: '+error.message;msg.style.color='#ff6060';return;}
  // Show thank you
  const card=document.querySelector('.rating-card');
  if(card) card.innerHTML=`<div class="rating-done">✅ ຂອບໃຈສຳລັບ Review! ${'★'.repeat(selRating)}</div>`;
};

load();
</script>
