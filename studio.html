<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHARE LOD — Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--surface:#0f0f1a;--card:#13131f;--border:rgba(255,255,255,0.06);--text:#f0eff8;--muted:#7a79a0;--p:#7c5cfc;--grad:linear-gradient(135deg,#7c5cfc,#e05cfc);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans Lao','DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.orb1{width:500px;height:500px;background:rgba(124,92,252,.08);top:-150px;left:-100px;}
nav{padding:16px 36px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);background:rgba(8,8,16,.85);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-back{font-size:13px;color:var(--muted);text-decoration:none;margin-left:auto;}
.nav-back:hover{color:var(--text);}
/* HERO */
.hero{position:relative;z-index:1;}
.hero-cover{height:220px;background:linear-gradient(135deg,#13131f,#1e1235);overflow:hidden;position:relative;}
.hero-cover-grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(6,1fr);gap:2px;opacity:.3;}
.hero-cover-grid img{width:100%;height:100%;object-fit:cover;}
.hero-cover-grad{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--bg));}
.hero-body{max-width:900px;margin:-60px auto 0;padding:0 28px 28px;position:relative;z-index:2;}
.studio-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;display:flex;align-items:flex-start;gap:22px;}
.studio-logo{width:80px;height:80px;border-radius:18px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;overflow:hidden;border:3px solid var(--card);}
.studio-logo img{width:100%;height:100%;object-fit:cover;}
.studio-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:4px;}
.studio-bio{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:12px;}
.studio-meta{display:flex;gap:18px;font-size:12px;color:var(--muted);flex-wrap:wrap;}
.stars{color:#f5c842;}
/* TABS */
.tabs{max-width:900px;margin:0 auto;padding:0 28px;display:flex;gap:0;border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:40;background:rgba(8,8,16,.9);backdrop-filter:blur(20px);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:14px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'Noto Sans Lao','DM Sans',sans-serif;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.tab.on{color:var(--p);border-bottom-color:var(--p);}
.tab-cnt{font-size:11px;opacity:.7;margin-left:4px;}
/* CONTENT */
.content{max-width:900px;margin:0 auto;padding:28px;}
/* PORTFOLIO GRID */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.pi{border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:1;background:var(--card);transition:transform .15s;}
.pi:hover{transform:scale(1.03);}
.pi img{width:100%;height:100%;object-fit:cover;display:block;}
.pi .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;background:rgba(255,255,255,.03);}
/* POSTS */
.post{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;}
.post-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.post-logo{width:38px;height:38px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;flex-shrink:0;}
.post-logo img{width:100%;height:100%;object-fit:cover;}
.post-nm{font-size:13px;font-weight:600;}
.post-time{font-size:11px;color:var(--muted);}
.post-img{width:100%;border-radius:10px;margin:12px 0;max-height:400px;object-fit:cover;display:block;}
.post-content{font-size:14px;line-height:1.7;margin-bottom:12px;}
.post-actions{display:flex;gap:14px;}
.like-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans','Noto Sans Lao',sans-serif;display:flex;align-items:center;gap:5px;transition:color .2s;}
.like-btn:hover,.like-btn.on{color:#ff6090;}
/* REVIEWS */
.rev{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;}
.rev-head{display:flex;justify-content:space-between;margin-bottom:6px;}
.rev-name{font-size:13px;font-weight:600;}
.rev-stars{color:#f5c842;font-size:12px;}
.rev-txt{font-size:13px;color:var(--muted);}
/* RATING FORM */
.rate-form{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:16px;}
.star-row{display:flex;gap:6px;cursor:pointer;margin:10px 0;}
.star-row span{font-size:26px;transition:transform .1s;}
.star-row span:hover{transform:scale(1.2);}
.inp{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:'DM Sans','Noto Sans Lao',sans-serif;outline:none;margin-bottom:8px;}
.inp::placeholder{color:var(--muted);}
.btn-grad{padding:10px 24px;background:var(--grad);border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans','Noto Sans Lao',sans-serif;}
/* LIGHTBOX */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:999;display:flex;align-items:center;justify-content:center;}
.lb.hidden{display:none;}
.lb img{max-width:90vw;max-height:90vh;border-radius:10px;object-fit:contain;}
.lb-x{position:fixed;top:18px;right:18px;background:rgba(255,255,255,.1);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:17px;cursor:pointer;}
.empty{text-align:center;padding:48px;color:var(--muted);}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:600px){
  .studio-card{flex-direction:column;}
  .tabs{padding:0 8px;}
  .tab{padding:12px 12px;font-size:12px;}
  .hero-cover{height:140px;}
  .pg{grid-template-columns:repeat(2,1fr);}
  nav{padding:12px 16px;}
  .hero-body{padding:0 14px 20px;}
  .content{padding:16px 14px;}
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<nav>
  <a class="nav-logo" href="explore.html">SHARE LOD</a>
  <a class="nav-back" href="explore.html">← ກັບໄປ Explore</a>
</nav>

<div id="app"><div class="spinner"></div></div>

<div class="lb hidden" id="lb">
  <button class="lb-x" onclick="document.getElementById('lb').classList.add('hidden')">✕</button>
  <div id="lb-body"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient('https://vuhjmwnxbvzppcoklgir.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1aGptd254YnZ6cHBjb2tsZ2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTM2NzAsImV4cCI6MjA5MDU2OTY3MH0.ijlH_tjBZm4irxrq-FXfIKIKdwZJTdTzaYbTPrpd928');

const uid = new URLSearchParams(location.search).get('id');
let data = null, curTab = 'posts', selStar = 0;
const sessKey = localStorage.getItem('slod_sess') || Math.random().toString(36).slice(2);
localStorage.setItem('slod_sess', sessKey);

function timeAgo(ts){
  const d=Math.floor((Date.now()-new Date(ts))/1000);
  if(d<60)return'ຫາກໍ';if(d<3600)return Math.floor(d/60)+' ນາທີກ່ອນ';
  if(d<86400)return Math.floor(d/3600)+' ຊົ່ວໂມງກ່ອນ';
  return new Date(ts).toLocaleDateString('lo-LA');
}
function stars(n){return'★'.repeat(Math.round(n||0))+'☆'.repeat(5-Math.round(n||0));}

async function load(){
  if(!uid){document.getElementById('app').innerHTML='<div class="empty">❌ ບໍ່ພົບ Studio</div>';return;}
  const {data:d}=await sb.rpc('get_studio_profile',{p_uid:uid});
  if(!d){document.getElementById('app').innerHTML='<div class="empty">❌ ບໍ່ພົບ Studio</div>';return;}
  data=d;
  const p=d.profile;
  const color=p.branding_color||'#7c5cfc';
  document.title=`${p.studio_name||'Studio'} — SHARE LOD`;

  // cover photos
  const coverImgs=(d.portfolio||[]).slice(0,6).map(f=>`<img src="${f.url}" loading="lazy">`).join('');

  document.getElementById('app').innerHTML=`
    <div class="hero">
      <div class="hero-cover">
        <div class="hero-cover-grid">${coverImgs}</div>
        <div class="hero-cover-grad"></div>
      </div>
      <div class="hero-body">
        <div class="studio-card">
          <div class="studio-logo" style="background:linear-gradient(135deg,${color},#e05cfc)">
            ${p.branding_logo?`<img src="${p.branding_logo}">`:'📷'}
          </div>
          <div style="flex:1">
            <div class="studio-name">${p.studio_name||'Studio'}</div>
            <div class="studio-bio">${p.branding_bio||'ຊ່າງພາບມືອາຊີບ'}</div>
            <div class="studio-meta">
              <span class="stars">${stars(d.avg_rating)} ${d.avg_rating||'—'} (${(d.ratings||[]).length} reviews)</span>
              <span>🖼 ${(d.portfolio||[]).length} ຜົນງານ</span>
              <span>👁 ${d.total_views||0} Views</span>
              <span>❤️ ${d.total_favs||0} Favs</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div style="padding:0 28px 16px;display:flex;gap:10px">
      <button onclick="goChat('${uid}')" style="padding:10px 22px;background:var(--grad);border:none;border-radius:100px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans','Noto Sans Lao',sans-serif">💬 Chat ກັບ Studio</button>
      <a href="feed.html" style="padding:10px 18px;border:1px solid var(--border);border-radius:100px;color:var(--muted);text-decoration:none;font-size:12px;display:flex;align-items:center">📰 Feed</a>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab on" onclick="switchTab('posts',this)">📢 ໂພສ<span class="tab-cnt">${(d.posts||[]).length}</span></button>
      <button class="tab" onclick="switchTab('portfolio',this)">🖼 Portfolio<span class="tab-cnt">${(d.portfolio||[]).length}</span></button>
      <button class="tab" onclick="switchTab('reviews',this)">⭐ Reviews<span class="tab-cnt">${(d.ratings||[]).length}</span></button>
    </div>
    <div class="content" id="tab-content"></div>`;

  renderTab();
}

window.switchTab=(tab,el)=>{
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderTab();
};

function renderTab(){
  const el=document.getElementById('tab-content');
  if(!el) return;
  if(curTab==='portfolio') renderPortfolio(el);
  else if(curTab==='reviews') renderReviews(el);
  else renderPosts(el);
}

// ── Facebook-style Posts ──────────────────────────────────
function renderPosts(el){
  const posts=data.posts||[];
  if(!posts.length){el.innerHTML='<div class="empty">📢 ຍັງບໍ່ມີໂພສ</div>';return;}
  const p=data.profile;
  el.innerHTML=posts.map(post=>{
    return`<div class="post" id="post-${post.id}" style="background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;">
      <div class="post-head">
        <div class="post-logo" style="background:linear-gradient(135deg,${p.branding_color||'#7c5cfc'},#e05cfc)">
          ${p.branding_logo?`<img src="${p.branding_logo}">`:'📷'}
        </div>
        <div><div class="post-nm">${p.studio_name||'Studio'}</div><div class="post-time">${timeAgo(post.created_at)}</div></div>
      </div>
      ${post.image_url?`<img class="post-img" src="${post.image_url}" loading="lazy" onclick="openLb('${post.image_url}')">`:''}
      <div class="post-content">${post.content.replace(/\n/g,'<br>')}</div>
      <div style="padding:6px 16px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;">
        <span id="lc-s-${post.id}">❤️ ${post.likes||0}</span>
        <span id="cc-s-${post.id}" onclick="stToggleCmts('${post.id}')" style="cursor:pointer">💬 0 ຄອມເມັ້ນ</span>
      </div>
      <div style="display:flex;border-bottom:1px solid var(--border)">
        <button onclick="stLike('${post.id}')" id="slb-${post.id}"
          style="flex:1;padding:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'DM Sans','Noto Sans Lao',sans-serif;font-size:13px;transition:background .15s;"
          onmouseover="this.style.background='rgba(255,255,255,.04)'" onmouseout="this.style.background='none'">🤍 Like</button>
        <button onclick="stToggleCmts('${post.id}')"
          style="flex:1;padding:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'DM Sans','Noto Sans Lao',sans-serif;font-size:13px;transition:background .15s;"
          onmouseover="this.style.background='rgba(255,255,255,.04)'" onmouseout="this.style.background='none'">💬 Comment</button>
        <button onclick="navigator.clipboard.writeText(location.href).then(()=>alert('✅ Copy Link ແລ້ວ!'))"
          style="flex:1;padding:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'DM Sans','Noto Sans Lao',sans-serif;font-size:13px;transition:background .15s;"
          onmouseover="this.style.background='rgba(255,255,255,.04)'" onmouseout="this.style.background='none'">🔗 Share</button>
      </div>
      <div id="st-cmts-${post.id}" style="display:none;padding:12px 16px 8px">
        <div id="st-clist-${post.id}"></div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
          <div style="width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">👤</div>
          <input id="st-cinp-${post.id}" placeholder="ຂຽນ Comment..."
            style="flex:1;padding:8px 13px;background:var(--surface);border:1px solid var(--border);border-radius:100px;color:var(--text);font-size:13px;font-family:'DM Sans','Noto Sans Lao',sans-serif;outline:none"
            onkeydown="if(event.key==='Enter')stComment('${post.id}')">
          <button onclick="stComment('${post.id}')" style="background:none;border:none;color:var(--p);cursor:pointer;font-size:18px">➤</button>
        </div>
      </div>
    </div>`;
  }).join('');
  posts.forEach(post=>stLoadCmtCount(post.id));
}

window.stLike=async(postId)=>{
  const btn=document.getElementById(`slb-${postId}`);
  const cnt=document.getElementById(`lc-s-${postId}`);
  const liked=btn.dataset.liked==='1';
  const n=parseInt(cnt.textContent.replace(/\D/g,''))||0;
  if(liked){
    await sb.from('post_likes').delete().eq('post_id',postId).eq('session_key',sessKey);
    await sb.from('posts').update({likes:Math.max(0,n-1)}).eq('id',postId);
    cnt.textContent=`❤️ ${Math.max(0,n-1)}`;btn.innerHTML='🤍 Like';btn.dataset.liked='0';btn.style.color='var(--muted)';
  }else{
    await sb.from('post_likes').insert({post_id:postId,session_key:sessKey});
    await sb.from('posts').update({likes:n+1}).eq('id',postId);
    cnt.textContent=`❤️ ${n+1}`;btn.innerHTML='❤️ Like';btn.dataset.liked='1';btn.style.color='#e05cfc';
  }
};

window.stToggleCmts=async(postId)=>{
  const el=document.getElementById(`st-cmts-${postId}`);
  const open=el.style.display!=='none'&&el.style.display!=='';
  el.style.display=open?'none':'block';
  if(!open){await stLoadCmts(postId);document.getElementById(`st-cinp-${postId}`)?.focus();}
};

async function stLoadCmtCount(postId){
  const {data}=await sb.from('post_comments').select('id',{count:'exact'}).eq('post_id',postId).is('parent_id',null);
  const el=document.getElementById(`cc-s-${postId}`);
  if(el) el.textContent=`💬 ${data?.length||0} ຄອມເມັ້ນ`;
}

async function stLoadCmts(postId){
  const {data}=await sb.from('post_comments').select('*').eq('post_id',postId).is('parent_id',null).order('created_at',{ascending:true});
  const cl=document.getElementById(`st-clist-${postId}`);if(!cl)return;
  if(!data?.length){cl.innerHTML='<div style="font-size:12px;color:var(--muted);padding:2px 0 6px">ເປັນຄົນທຳອິດ Comment!</div>';return;}
  cl.innerHTML=data.map(c=>`
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="width:30px;height:30px;border-radius:50%;background:${c.is_studio?'linear-gradient(135deg,#f5c842,#e05cfc)':'var(--grad)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">${(c.commenter_name||'?').charAt(0)}</div>
      <div>
        <div style="background:var(--surface);border-radius:14px;padding:8px 12px;display:inline-block">
          <div style="font-size:11px;font-weight:700;margin-bottom:2px;${c.is_studio?'color:#f5c842':''}">${c.commenter_name}${c.is_studio?' 🏢':''}</div>
          <div style="font-size:13px;line-height:1.5">${c.content}</div>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px;padding-left:4px">${timeAgo(c.created_at)}</div>
      </div>
    </div>`).join('');
}

window.stComment=async(postId)=>{
  const inp=document.getElementById(`st-cinp-${postId}`);
  const content=inp?.value.trim();if(!content)return;
  inp.value='';
  const isOwner=data?.profile?.id===uid;
  await sb.from('post_comments').insert({post_id:postId,parent_id:null,commenter_name:isOwner?data.profile.studio_name:'Guest',session_key:sessKey,is_studio:isOwner,content});
  stLoadCmts(postId);stLoadCmtCount(postId);
};

// Check liked posts on load
(async()=>{
  const ps=data?.posts||[];
  if(!ps.length)return;
  const {data:lk}=await sb.from('post_likes').select('post_id').eq('session_key',sessKey);
  const liked=new Set((lk||[]).map(l=>l.post_id));
  ps.forEach(p=>{
    const btn=document.getElementById(`slb-${p.id}`);
    if(btn&&liked.has(p.id)){btn.innerHTML='❤️ Like';btn.dataset.liked='1';btn.style.color='#e05cfc';}
    else if(btn){btn.dataset.liked='0';}
  });
})();

// ─ old toggleLike kept for compatibility but replaced above
window.toggleLike=async(postId,btn)=>{
  const cnt=document.getElementById('lc-'+postId);
  if(btn.classList.contains('on')){
    await sb.from('post_likes').delete().eq('post_id',postId).eq('session_key',sessKey);
    const n=Math.max(0,(parseInt(cnt.textContent)||1)-1);
    await sb.from('posts').update({likes:n}).eq('id',postId);
    btn.classList.remove('on');cnt.textContent=n;
  }else{
    await sb.from('post_likes').insert({post_id:postId,session_key:sessKey});
    const n=(parseInt(cnt.textContent)||0)+1;
    await sb.from('posts').update({likes:n}).eq('id',postId);
    btn.classList.add('on');cnt.textContent=n;
  }
};


function renderPortfolio(el){
  const port=data.portfolio||[];
  if(!port.length){el.innerHTML='<div class="empty">🖼 ຍັງບໍ່ມີຜົນງານ</div>';return;}
  el.innerHTML=`<div class="pg">${port.map(f=>`
    <div class="pi" onclick="openLb('${f.url}')">
      ${f.mime_type?.startsWith('image')?`<img src="${f.url}" loading="lazy">`:`<div class="ph">🎬</div>`}
    </div>`).join('')}</div>`;
}

function renderReviews(el){
  const revs=data.ratings||[];
  const avg=data.avg_rating;
  const avgHtml=avg?`<div style="display:flex;align-items:center;gap:16px;padding:18px;background:var(--surface);border-radius:12px;margin-bottom:18px">
    <div style="font-family:'Playfair Display',serif;font-size:44px;font-weight:900">${avg}</div>
    <div><div class="stars" style="font-size:22px">${stars(avg)}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">${revs.length} Reviews</div></div>
  </div>`:'';
  const revHtml=revs.length?revs.map(r=>`
    <div class="rev">
      <div class="rev-head"><span class="rev-name">${r.reviewer_name||'ນິລະນາມ'}</span><span class="rev-stars">${stars(r.score)}</span></div>
      ${r.comment?`<div class="rev-txt">${r.comment}</div>`:''}
      <div style="font-size:10px;color:var(--muted);margin-top:4px">${timeAgo(r.created_at)}</div>
    </div>`).join(''):'';

  el.innerHTML=`${avgHtml}${revHtml}
    <div class="rate-form">
      <div style="font-size:14px;font-weight:600;margin-bottom:6px">✍️ ຂຽນ Review</div>
      <div class="star-row" id="rsr">${[1,2,3,4,5].map(n=>`<span onclick="setStar(${n})" id="rs${n}">☆</span>`).join('')}</div>
      <input class="inp" id="rname" placeholder="ຊື່ຂອງທ່ານ *">
      <textarea class="inp" id="rtxt" placeholder="ຄຳເຫັນ..." style="min-height:70px;resize:vertical"></textarea>
      <button class="btn-grad" onclick="submitRev()">⭐ ສົ່ງ Review</button>
      <span id="rev-msg" style="font-size:12px;margin-left:10px;display:none"></span>
    </div>`;
}

window.toggleLike=async(postId,btn)=>{
  const cnt=document.getElementById('lc-'+postId);
  if(btn.classList.contains('on')){
    await sb.from('post_likes').delete().eq('post_id',postId).eq('session_key',sessKey);
    await sb.from('posts').update({likes:Math.max(0,(parseInt(cnt.textContent)||1)-1)}).eq('id',postId);
    btn.classList.remove('on'); btn.querySelector('span').textContent=(parseInt(cnt.textContent)||1)-1;
    btn.innerHTML='🤍 <span id="lc-'+postId+'">'+(parseInt(cnt.textContent)-1)+'</span>';
  } else {
    await sb.from('post_likes').insert({post_id:postId,session_key:sessKey});
    const newLikes=(parseInt(cnt.textContent)||0)+1;
    await sb.from('posts').update({likes:newLikes}).eq('id',postId);
    btn.classList.add('on');
    btn.innerHTML='❤️ <span id="lc-'+postId+'">'+newLikes+'</span>';
  }
};

window.setStar=n=>{
  selStar=n;
  [1,2,3,4,5].forEach(i=>{const el=document.getElementById('rs'+i);if(el)el.textContent=i<=n?'★':'☆';});
};

window.submitRev=async()=>{
  const name=document.getElementById('rname')?.value.trim();
  const txt=document.getElementById('rtxt')?.value.trim();
  const msg=document.getElementById('rev-msg');
  if(!selStar){msg.textContent='⚠️ ເລືອກດາວ';msg.style.color='#f5c842';msg.style.display='inline';return;}
  if(!name){msg.textContent='⚠️ ໃສ່ຊື່';msg.style.color='#f5c842';msg.style.display='inline';return;}
  await sb.from('ratings').insert({studio_uid:uid,score:selStar,reviewer_name:name,comment:txt});
  msg.textContent='✅ ຂອບໃຈ!';msg.style.color='#80ffaa';msg.style.display='inline';
  setTimeout(()=>load(),1200);
};

window.openLb=url=>{
  document.getElementById('lb-body').innerHTML=`<img src="${url}" style="max-width:90vw;max-height:90vh;border-radius:10px">`;
  document.getElementById('lb').classList.remove('hidden');
};
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('lb').classList.add('hidden');});

// ── Chat + Notification ────────────────────────────────────
let meSession=null;
sb.auth.getSession().then(({data:{session}})=>{
  meSession=session;
  if(session) setupNotif(session.user.id);
  // Update nav
  const nr=document.getElementById('nav-right-studio');
  if(nr&&session){
    nr.innerHTML=`<a href="my-chats.html" style="padding:6px 14px;border-radius:100px;background:rgba(124,92,252,.12);border:1px solid rgba(124,92,252,.2);color:var(--p);text-decoration:none;font-size:12px">💬 ການສົນທະນາ</a>`;
  }
});

window.goChat=(studioId)=>{
  if(!meSession){
    if(confirm('ຕ້ອງ Login ກ່ອນ Chat — ໄປ Login?'))
      location.href=`login.html?tab=member&next=my-chats.html?studio=${studioId}`;
    return;
  }
  location.href=`my-chats.html?studio=${studioId}`;
};

function setupNotif(userId){
  sb.channel(`notif-st-${userId}`)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`sender_key=eq.${userId}`},payload=>{
      const m=payload.new;
      if(m.is_from_studio){ playNotif(); showToast(m.studio_uid,m.content); }
    }).subscribe();
}
function playNotif(){try{const c=new AudioContext();[[880,0],[1100,.13]].forEach(([f,d])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0,c.currentTime+d);g.gain.linearRampToValueAtTime(.2,c.currentTime+d+.02);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d+.35);o.start(c.currentTime+d);o.stop(c.currentTime+d+.4);});}catch(e){}}
function showToast(studioId,msg){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;bottom:24px;right:24px;background:#1e1e30;border:1px solid rgba(124,92,252,.4);border-radius:14px;padding:14px 18px;z-index:9999;cursor:pointer;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:280px';
  d.innerHTML=`<div style="font-size:12px;color:var(--muted);margin-bottom:4px">💬 ຂໍ້ຄວາມໃໝ່</div><div style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${msg}</div><div style="font-size:11px;color:var(--p);margin-top:5px">ກົດເບິ່ງ →</div>`;
  d.onclick=()=>location.href='my-chats.html?studio='+studioId;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),6000);
}

load();
</script>
</body>
