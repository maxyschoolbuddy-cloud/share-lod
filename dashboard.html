<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHARE LOD — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--surface:#0f0f1a;--card:#13131f;--border:rgba(255,255,255,0.06);--text:#f0eff8;--muted:#7a79a0;--a1:#7c5cfc;--a2:#e05cfc;--a3:#5cf0fc;--gold:#f5c842;--grad:linear-gradient(135deg,#7c5cfc,#e05cfc);--sw:240px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans','Noto Sans Lao',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}
/* SIDEBAR */
.sb{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;}
.sb-logo{padding:24px 20px 18px;border-bottom:1px solid var(--border);}
.sb-logo-txt{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sb-studio{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:500;transition:all .2s;cursor:pointer;border:none;background:none;width:100%;font-family:'DM Sans','Noto Sans Lao',sans-serif;}
.ni:hover{background:rgba(255,255,255,.05);color:var(--text);}
.ni.active{background:rgba(124,92,252,.15);color:var(--a1);}
.ni .ic{font-size:15px;width:20px;text-align:center;}
.sb-foot{padding:14px 10px;border-top:1px solid var(--border);}
.plan-box{background:rgba(124,92,252,.08);border:1px solid rgba(124,92,252,.18);border-radius:10px;padding:12px;margin-bottom:10px;}
.plan-nm{font-size:11px;color:var(--a1);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.plan-st{font-size:11px;color:var(--muted);margin-top:2px;}
.stor-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:8px;margin-bottom:5px;}
.stor-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.stor-fill{height:100%;background:var(--grad);border-radius:2px;transition:width .5s;}
/* MAIN */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;}
.topbar{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:40;}
.tb-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:800;}
.tb-right{display:flex;align-items:center;gap:10px;}
.btn{padding:9px 20px;background:var(--grad);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans','Noto Sans Lao',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:opacity .2s;}
.btn:hover{opacity:.85;}
.btn-out{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-out:hover{background:rgba(255,255,255,.04);}
.content{padding:28px;flex:1;}
/* PENDING BANNER */
.pending{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.2);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.pending.hidden{display:none;}
.pending h4{font-size:13px;color:#f5c842;font-weight:600;}
.pending p{font-size:12px;color:var(--muted);margin-top:2px;}
.expiry-warn{background:rgba(255,100,50,.07);border:1px solid rgba(255,100,50,.25);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.expiry-warn.hidden{display:none;}
.expiry-warn h4{font-size:13px;color:#ff7850;font-weight:600;}
.expiry-warn p{font-size:12px;color:var(--muted);margin-top:2px;}
.expiry-danger{background:rgba(255,50,50,.08);border:1px solid rgba(255,50,50,.25);}
.expiry-danger h4{color:#ff5050;}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
.sc-icon{font-size:22px;margin-bottom:10px;}
.sc-num{font-family:'Playfair Display',serif;font-size:30px;font-weight:800;margin-bottom:3px;}
.sc-lbl{font-size:12px;color:var(--muted);}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.wid{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;}
.wid-title{font-size:14px;font-weight:600;margin-bottom:18px;display:flex;justify-content:space-between;}
.wid-title a{font-size:12px;color:var(--a1);text-decoration:none;}
.li{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.li:last-child{border-bottom:none;}
.li-ic{width:36px;height:36px;border-radius:9px;background:rgba(124,92,252,.1);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.li-info{flex:1;min-width:0;}
.li-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.li-act{font-size:12px;color:var(--a1);text-decoration:none;flex-shrink:0;}
.empty{text-align:center;padding:28px;color:var(--muted);font-size:13px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--a1);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--muted);font-size:13px;}
.hbg{display:none;align-items:center;justify-content:center;width:38px;height:38px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:9px;cursor:pointer;font-size:18px;flex-shrink:0;}
@media(max-width:900px){.sb{transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}.sb.open{transform:translateX(0);box-shadow:0 0 40px rgba(0,0,0,.6);}.main{margin-left:0;}.stats{grid-template-columns:repeat(2,1fr);}.g2{grid-template-columns:1fr;}.hbg{display:flex!important;}.topbar{padding:14px 16px;}.content{padding:18px 14px;}}
</style>
</head>
<body>
<aside class="sb">
  <div class="sb-logo"><div class="sb-logo-txt">SHARE LOD</div><div class="sb-studio" id="sb-name">ກຳລັງໂຫຼດ...</div></div>
  <nav class="sb-nav">
    <a class="ni active" href="dashboard.html"><span class="ic">📊</span>Dashboard</a>
    <a class="ni" href="clients.html"><span class="ic">👥</span>Clients</a>
    <a class="ni" href="upload.html"><span class="ic">⬆️</span>Upload ຟາຍ</a>
    <a class="ni" href="branding.html"><span class="ic">🎨</span>Branding</a>
    <a class="ni" href="portfolio.html"><span class="ic">🖼</span>Portfolio</a>
    <a class="ni" href="inbox.html"><span class="ic">💬</span>Inbox</a>
    <a class="ni" href="community.html"><span class="ic">🌐</span>Community</a>
    <a class="ni" href="subscription.html"><span class="ic">💳</span>Subscription</a>
    <a class="ni" href="explore.html" target="_blank"><span class="ic">🌐</span>Explore Page</a>
  </nav>
  <div class="sb-foot">
    <div class="plan-box">
      <div class="plan-nm" id="sb-plan">— Plan</div>
      <div class="plan-st" id="sb-status"></div>
      <div class="stor-lbl"><span id="sb-used">0 MB</span><span id="sb-lim">0 GB</span></div>
      <div class="stor-bar"><div class="stor-fill" id="sb-bar" style="width:0%"></div></div>
    </div>
    <button class="ni" onclick="logout()" style="color:#ff7070;width:100%"><span class="ic">🚪</span>ອອກຈາກລະບົບ</button>
  </div>
</aside>
<div class="main">
  <div class="topbar"><button class="hbg" onclick="openSb()">☰</button>
    <div class="tb-title" id="greeting">ສະບາຍດີ 👋</div>
    <div class="tb-right">
      <a href="upload.html" class="btn">⬆ Upload</a>
      <a href="clients.html" class="btn btn-out">+ Client</a>
    </div>
  </div>
  <div class="content">
    <div class="pending hidden" id="pending-box">
      <span style="font-size:22px">⏳</span>
      <div><h4>ລໍຖ້າ Activate Plan</h4><p>Admin ຈະ Activate ພາຍໃນ 1-2 ຊົ່ວໂມງ ຫຼັງຊຳລະ — <a href="subscription.html" style="color:var(--a1)">ເບິ່ງ Subscription</a></p></div>
    </div>
    <div class="expiry-warn hidden" id="expiry-box">
      <span style="font-size:22px">⚠️</span>
      <div><h4 id="expiry-title">ໃກ້ໝົດອາຍຸ</h4><p id="expiry-desc"></p></div>
    </div>
    <div id="main-body"><div class="loading"><div class="spinner"></div> ກຳລັງໂຫຼດ...</div></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient('https://vuhjmwnxbvzppcoklgir.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1aGptd254YnZ6cHBjb2tsZ2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTM2NzAsImV4cCI6MjA5MDU2OTY3MH0.ijlH_tjBZm4irxrq-FXfIKIKdwZJTdTzaYbTPrpd928');

function fmt(b){if(b<1048576)return(b/1024).toFixed(1)+' KB';if(b<1073741824)return(b/1048576).toFixed(1)+' MB';return(b/1073741824).toFixed(2)+' GB';}

window.logout = async()=>{await sb.auth.signOut();location.href='login.html';}

const {data:{session}} = await sb.auth.getSession();
if(!session){location.href='login.html';}

const uid = session.user.id;
const {data:u} = await sb.from('profiles').select('*').eq('id',uid).single();
if(!u){location.href='login.html';}
if(u.role==='admin'){location.href='admin.html';}

// Sidebar
document.getElementById('sb-name').textContent = u.studio_name||'';
document.getElementById('sb-plan').textContent = (u.plan||'starter').toUpperCase()+' Plan';
document.getElementById('sb-status').textContent = u.plan_status==='active'?'✅ Active':'⏳ ລໍຖ້າ Activate';
const pct = u.storage_limit>0?Math.min(100,(u.storage_used/u.storage_limit)*100):0;
document.getElementById('sb-used').textContent = fmt(u.storage_used||0);
document.getElementById('sb-lim').textContent  = fmt(u.storage_limit||0);
document.getElementById('sb-bar').style.width  = pct+'%';
document.getElementById('greeting').textContent = 'ສະບາຍດີ, '+u.studio_name+' 👋';
if(u.plan_status!=='active') document.getElementById('pending-box').classList.remove('hidden');

// ກວດ expiry
await sb.rpc('check_and_suspend_expired');
if(u.plan_status==='active' && u.plan_expires_at){
  const exp=new Date(u.plan_expires_at), now=new Date();
  const days=Math.ceil((exp-now)/(1000*60*60*24));
  const box=document.getElementById('expiry-box');
  if(days<=0){
    location.reload();
  } else if(days<=7){
    box.classList.remove('hidden');
    if(days<=3) box.classList.add('expiry-danger');
    document.getElementById('expiry-title').textContent=`⚠️ Plan ຈະໝົດໃນ ${days} ວັນ!`;
    document.getElementById('expiry-desc').innerHTML=`ກະລຸນາ <a href="subscription.html" style="color:var(--a1)">ຕໍ່ອາຍຸ</a> ກ່ອນໝົດ ຫຼື ຈະຖືກຢຸດໃຊ້ງານ`;
  }
}

// sidebar expiry
if(u.plan_expires_at){
  const d=Math.ceil((new Date(u.plan_expires_at)-new Date())/(1000*60*60*24));
  document.getElementById('sb-status').textContent = u.plan_status==='active' ? `✅ Active · ໝົດ ${d} ວັນ` : '⏳ ລໍຖ້າ Activate';
}

// Load stats
const [{data:clients},{data:filesAll},{data:files}] = await Promise.all([
  sb.from('clients').select('id').eq('uid',uid),
  sb.from('files').select('id').eq('uid',uid),
  sb.from('files').select('id,name,size,mime_type,client_name,created_at').eq('uid',uid).order('created_at',{ascending:false}).limit(5)
]);
const cSnap = await sb.from('clients').select('id,name,email,created_at').eq('uid',uid).order('created_at',{ascending:false}).limit(5);

// Community stats
const [{data:views},{data:cmts},{data:favs},{data:ratingData}] = await Promise.all([
  sb.from('gallery_views').select('id').eq('studio_uid',uid),
  sb.from('comments').select('id').eq('studio_uid',uid),
  sb.from('favorites').select('id').eq('studio_uid',uid),
  sb.from('ratings').select('score').eq('studio_uid',uid)
]);
const avgRating = ratingData?.length ? (ratingData.reduce((s,r)=>s+r.score,0)/ratingData.length).toFixed(1) : '—';

document.getElementById('main-body').innerHTML = `
  <div class="stats">
    <div class="sc"><div class="sc-icon">👥</div><div class="sc-num">${clients?.length||0}</div><div class="sc-lbl">Clients</div></div>
    <div class="sc"><div class="sc-icon">📁</div><div class="sc-num">${filesAll?.length||0}</div><div class="sc-lbl">ຟາຍທັງໝົດ</div></div>
    <div class="sc"><div class="sc-icon">💾</div><div class="sc-num">${fmt(u.storage_used||0)}</div><div class="sc-lbl">Storage ໃຊ້</div></div>
    <div class="sc"><div class="sc-icon">📊</div><div class="sc-num">${Math.round(pct)}%</div><div class="sc-lbl">Storage %</div></div>
  </div>
  <div class="stats" style="margin-bottom:24px">
    <div class="sc"><div class="sc-icon">👁</div><div class="sc-num">${views?.length||0}</div><div class="sc-lbl">ລູກຄ້າເຂົ້າເບິ່ງ</div></div>
    <div class="sc"><div class="sc-icon">❤️</div><div class="sc-num">${favs?.length||0}</div><div class="sc-lbl">ຮູບທີ່ຖືກກາໝາຍ</div></div>
    <div class="sc"><div class="sc-icon">💬</div><div class="sc-num">${cmts?.length||0}</div><div class="sc-lbl">Comments</div></div>
    <div class="sc"><div class="sc-icon">⭐</div><div class="sc-num">${avgRating}</div><div class="sc-lbl">ຄະແນນສະເລ່ຍ</div></div>
  </div>
  <div class="g2">
    <div class="wid">
      <div class="wid-title">Clients ຫຼ້າສຸດ <a href="clients.html">ທັງໝົດ →</a></div>
      ${!cSnap.data?.length?'<div class="empty">ຍັງບໍ່ມີ Client — <a href="clients.html" style="color:var(--a1)">ເພີ່ມເລີຍ</a></div>':
        cSnap.data.map(c=>`<div class="li"><div class="li-ic">👤</div><div class="li-info"><div class="li-name">${c.name}</div><div class="li-sub">${c.email||'ບໍ່ມີ email'}</div></div><a class="li-act" href="clients.html">→</a></div>`).join('')}
    </div>
    <div class="wid">
      <div class="wid-title">ຟາຍຫຼ້າສຸດ <a href="upload.html">Upload →</a></div>
      ${!files?.length?'<div class="empty">ຍັງບໍ່ມີຟາຍ — <a href="upload.html" style="color:var(--a1)">Upload ເລີຍ</a></div>':
        files.map(f=>`<div class="li"><div class="li-ic">${f.mime_type?.startsWith('video')?'🎬':'🖼'}</div><div class="li-info"><div class="li-name">${f.name}</div><div class="li-sub">${fmt(f.size||0)} · ${f.client_name||''}</div></div></div>`).join('')}
    </div>
  </div>`;
</script>
<div id="sb-ov" onclick="closeSb()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:49;backdrop-filter:blur(2px)"></div>
<script>
function openSb(){document.querySelector('.sb').classList.add('open');document.getElementById('sb-ov').style.display='block';document.body.style.overflow='hidden';}
function closeSb(){document.querySelector('.sb').classList.remove('open');document.getElementById('sb-ov').style.display='none';document.body.style.overflow='';}
</script>
</body>
</html>
