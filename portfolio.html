<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHARE LOD — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--surface:#0f0f1a;--card:#13131f;--border:rgba(255,255,255,0.06);--text:#f0eff8;--muted:#7a79a0;--a1:#7c5cfc;--grad:linear-gradient(135deg,#7c5cfc,#e05cfc);--sw:240px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans','Noto Sans Lao',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}
.sb{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;}
.sb-logo{padding:24px 20px 18px;border-bottom:1px solid var(--border);}
.sb-logo-txt{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sb-studio{font-size:12px;color:var(--muted);margin-top:3px;}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:500;transition:all .2s;cursor:pointer;border:none;background:none;width:100%;font-family:'DM Sans','Noto Sans Lao',sans-serif;}
.ni:hover{background:rgba(255,255,255,.05);color:var(--text);}
.ni.active{background:rgba(124,92,252,.15);color:var(--a1);}
.ni .ic{font-size:15px;width:20px;text-align:center;}
.sb-foot{padding:14px 10px;border-top:1px solid var(--border);}
.main{margin-left:var(--sw);flex:1;}
.topbar{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:40;}
.tb-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:800;}
.tb-right{display:flex;gap:10px;align-items:center;}
.btn{padding:9px 20px;background:var(--grad);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans','Noto Sans Lao',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:opacity .2s;}
.btn:hover{opacity:.85;}
.btn-out{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-out:hover{background:rgba(255,255,255,.05);}
.content{padding:28px;}
/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border);border-radius:18px;padding:40px;text-align:center;cursor:pointer;transition:all .3s;position:relative;margin-bottom:28px;}
.upload-zone:hover,.upload-zone.drag{border-color:rgba(124,92,252,.5);background:rgba(124,92,252,.04);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.uz-icon{font-size:44px;margin-bottom:12px;}
.uz-title{font-size:16px;font-weight:600;margin-bottom:4px;}
.uz-sub{font-size:12px;color:var(--muted);}
/* PROGRESS */
.up-progress{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:20px;display:none;}
.up-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.up-row:last-child{margin-bottom:0;}
.up-name{font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.up-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;flex:1;}
.up-fill{height:100%;background:var(--grad);border-radius:2px;transition:width .3s;}
.up-pct{font-size:11px;color:var(--muted);width:36px;text-align:right;}
/* FILTER BAR */
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.ftag{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans','Noto Sans Lao',sans-serif;transition:all .2s;}
.ftag:hover{border-color:rgba(124,92,252,.3);color:var(--text);}
.ftag.on{background:var(--grad);border-color:transparent;color:#fff;}
/* STATS BAR */
.stats-row{display:flex;gap:20px;margin-bottom:24px;}
.sstat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;}
.sstat-n{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;}
.sstat-l{font-size:11px;color:var(--muted);}
/* PORTFOLIO GRID */
.pg{columns:4 180px;gap:10px;}
.pi{break-inside:avoid;margin-bottom:10px;border-radius:12px;overflow:hidden;position:relative;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:border-color .2s;}
.pi:hover{border-color:rgba(124,92,252,.4);}
.pi:hover .pi-overlay{opacity:1;}
.pi img,.pi video{width:100%;display:block;}
.pi-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);opacity:0;transition:opacity .2s;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;}
.pi-caption{font-size:12px;color:#fff;margin-bottom:8px;}
.pi-actions{display:flex;gap:6px;}
.pa{padding:5px 11px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans','Noto Sans Lao',sans-serif;border:none;transition:all .2s;}
.pa-e{background:rgba(255,255,255,.15);color:#fff;}
.pa-d{background:rgba(255,80,80,.2);color:#ff8080;}
.pa-h{background:rgba(255,200,50,.2);color:#f5c842;}
.pi-cat{position:absolute;top:8px;left:8px;padding:3px 9px;background:rgba(0,0,0,.6);border-radius:100px;font-size:10px;color:#fff;backdrop-filter:blur(4px);}
.pi-hidden-badge{position:absolute;top:8px;right:8px;padding:3px 9px;background:rgba(0,0,0,.7);border-radius:100px;font-size:10px;color:#f5c842;}
/* EDIT MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.ov.hidden{display:none;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:460px;}
.modal h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:800;margin-bottom:20px;}
.modal img{width:100%;border-radius:10px;margin-bottom:16px;max-height:220px;object-fit:cover;}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;}
.inp{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:'DM Sans','Noto Sans Lao',sans-serif;outline:none;margin-bottom:14px;}
.inp:focus{border-color:rgba(124,92,252,.4);}
.inp::placeholder{color:var(--muted);}
.modal-acts{display:flex;gap:10px;margin-top:4px;}
.mbtn{flex:1;padding:11px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans','Noto Sans Lao',sans-serif;}
.mbtn-p{background:var(--grad);border:none;color:#fff;}
.mbtn-c{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--muted);}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--a1);border-radius:50%;animation:spin .8s linear infinite;display:block;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:48px;color:var(--muted);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1e30;border:1px solid rgba(124,92,252,.3);border-radius:10px;padding:11px 22px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.hbg{display:none;align-items:center;justify-content:center;width:38px;height:38px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:9px;cursor:pointer;font-size:18px;flex-shrink:0;}
@media(max-width:900px){.sb{display:none;}.main{margin-left:0;}.pg{columns:2 140px;}.stats-row{flex-wrap:wrap;}}
</style>
</head>
<body>
<aside class="sb">
  <div class="sb-logo"><div class="sb-logo-txt">SHARE LOD</div><div class="sb-studio" id="sb-name"></div></div>
  <nav class="sb-nav">
    <a class="ni" href="dashboard.html"><span class="ic">📊</span>Dashboard</a>
    <a class="ni" href="clients.html"><span class="ic">👥</span>Clients</a>
    <a class="ni" href="upload.html"><span class="ic">⬆️</span>Upload ຟາຍ</a>
    <a class="ni" href="branding.html"><span class="ic">🎨</span>Branding</a>
    <a class="ni active" href="portfolio.html"><span class="ic">🖼</span>Portfolio</a>
    <a class="ni" href="inbox.html"><span class="ic">💬</span>Inbox</a>
    <a class="ni" href="community.html"><span class="ic">🌐</span>Community</a>
    <a class="ni" href="subscription.html"><span class="ic">💳</span>Subscription</a>
  </nav>
  <div class="sb-foot">
    <button class="ni" onclick="logout()" style="color:#ff7070;width:100%"><span class="ic">🚪</span>ອອກ</button>
  </div>
</aside>

<div class="main">
  <div class="topbar"><button class="hbg" onclick="openSb()">☰</button>
    <div class="tb-title">🖼 Portfolio</div>
    <div class="tb-right">
      <a id="view-btn" href="#" target="_blank" class="btn btn-out" style="font-size:12px">👁 ເບິ່ງໜ້າ Public</a>
    </div>
  </div>
  <div class="content">
    <!-- STATS -->
    <div class="stats-row" id="stats-row">
      <div class="sstat"><span style="font-size:22px">🖼</span><div><div class="sstat-n" id="st-total">0</div><div class="sstat-l">ຮູບທັງໝົດ</div></div></div>
      <div class="sstat"><span style="font-size:22px">✅</span><div><div class="sstat-n" id="st-vis">0</div><div class="sstat-l">ສະແດງຢູ່</div></div></div>
      <div class="sstat"><span style="font-size:22px">📂</span><div><div class="sstat-n" id="st-cat">0</div><div class="sstat-l">ໝວດ</div></div></div>
      <div class="sstat"><span style="font-size:22px">❤️</span><div><div class="sstat-n" id="st-likes">0</div><div class="sstat-l">Likes</div></div></div>
    </div>

    <!-- UPLOAD ZONE -->
    <div class="upload-zone" id="uz">
      <input type="file" id="file-inp" multiple accept="image/*,video/*" onchange="handleFiles(this.files)">
      <div class="uz-icon">📸</div>
      <div class="uz-title">ລາກ & ວາງ ຫຼື ຄລິກເລືອກຮູບ</div>
      <div class="uz-sub">JPG · PNG · MP4 · MOV — ເພີ່ມໃສ່ Portfolio ສາທາລະນະໄດ້ທັນທີ</div>
    </div>
    <div class="up-progress" id="up-prog"></div>

    <!-- FILTER -->
    <div class="filter-bar" id="filter-bar">
      <button class="ftag on" onclick="setFilter('all',this)">ທັງໝົດ</button>
    </div>

    <!-- GRID -->
    <div id="port-grid"><div class="spinner"></div></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="ov hidden" id="edit-modal">
  <div class="modal">
    <h3>✏️ ແກ້ໄຂຮູບ</h3>
    <img id="em-img" src="">
    <div>
      <label>Caption / ຄຳອະທິບາຍ</label>
      <input class="inp" id="em-caption" placeholder="ເຊັ່ນ: Wedding 2024, Portrait Session...">
    </div>
    <div>
      <label>ໝວດ / Category</label>
      <input class="inp" id="em-cat" placeholder="ເຊັ່ນ: Wedding, Portrait, Event...">
    </div>
    <div class="modal-acts">
      <button class="mbtn mbtn-c" onclick="closeEdit()">ຍົກເລີກ</button>
      <button class="mbtn mbtn-p" onclick="saveEdit()">💾 ບັນທຶກ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient('https://vuhjmwnxbvzppcoklgir.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1aGptd254YnZ6cHBjb2tsZ2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTM2NzAsImV4cCI6MjA5MDU2OTY3MH0.ijlH_tjBZm4irxrq-FXfIKIKdwZJTdTzaYbTPrpd928');

let uid, allPort=[], filterCat='all', editId=null;
window.logout=async()=>{await sb.auth.signOut();location.href='login.html';}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function fmt(b){if(b<1048576)return(b/1024).toFixed(0)+' KB';if(b<1073741824)return(b/1048576).toFixed(1)+' MB';return(b/1073741824).toFixed(2)+' GB';}

// ─── DRAG & DROP ─────────────────────────────────────────
const uz=document.getElementById('uz');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag');});
uz.addEventListener('dragleave',()=>uz.classList.remove('drag'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag');handleFiles(e.dataTransfer.files);});

// ─── UPLOAD ──────────────────────────────────────────────
window.handleFiles=async(files)=>{
  const arr=Array.from(files);
  if(!arr.length) return;
  const prog=document.getElementById('up-prog');
  prog.style.display='block';
  prog.innerHTML=arr.map((f,i)=>`<div class="up-row"><span class="up-name">${f.name}</span><div class="up-bar"><div class="up-fill" id="pf${i}" style="width:0%"></div></div><span class="up-pct" id="pp${i}">0%</span></div>`).join('');

  for(let i=0;i<arr.length;i++){
    const f=arr[i];
    document.getElementById('pp'+i).textContent='ໂຫຼດ...';
    const safeName=f.name.replace(/[^\x00-\x7F]/g,'_').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9._\-]/g,'_');
    const path=`${uid}/portfolio/${Date.now()}_${safeName}`;
    const {error:upErr}=await sb.storage.from('framevault-files').upload(path,f,{upsert:false});
    if(upErr){document.getElementById('pp'+i).textContent='❌';continue;}
    document.getElementById('pf'+i).style.width='60%';
    const {data:sd}=await sb.storage.from('framevault-files').createSignedUrl(path,60*60*24*365*10);
    const url=sd?.signedUrl||'';
    await sb.from('portfolio').insert({uid,url,mime_type:f.type,caption:'',category:'General',is_visible:true,order_index:allPort.length+i});
    document.getElementById('pf'+i).style.width='100%';
    document.getElementById('pp'+i).textContent='✅';
  }
  setTimeout(()=>{prog.style.display='none';},2000);
  toast('✅ Upload Portfolio ສຳເລັດ!');
  load();
};

// ─── EDIT MODAL ──────────────────────────────────────────
window.openEdit=(id)=>{
  editId=id;
  const p=allPort.find(x=>x.id===id);
  if(!p)return;
  document.getElementById('em-img').src=p.url;
  document.getElementById('em-caption').value=p.caption||'';
  document.getElementById('em-cat').value=p.category||'General';
  document.getElementById('edit-modal').classList.remove('hidden');
};
window.closeEdit=()=>{document.getElementById('edit-modal').classList.add('hidden');editId=null;};
window.saveEdit=async()=>{
  if(!editId)return;
  await sb.from('portfolio').update({
    caption:document.getElementById('em-caption').value.trim(),
    category:document.getElementById('em-cat').value.trim()||'General'
  }).eq('id',editId);
  closeEdit();toast('✅ ບັນທຶກສຳເລັດ!');load();
};

// ─── TOGGLE VISIBLE ──────────────────────────────────────
window.toggleVisible=async(id,current)=>{
  await sb.from('portfolio').update({is_visible:!current}).eq('id',id);
  toast(current?'🙈 ຊ່ອນຮູບ':'👁 ສະແດງຮູບ');
  load();
};

// ─── DELETE ──────────────────────────────────────────────
window.delPort=async(id)=>{
  if(!confirm('ລຶບຮູບ Portfolio ນີ້?'))return;
  await sb.from('portfolio').delete().eq('id',id);
  toast('ລຶບສຳເລັດ');load();
};

// ─── FILTER ──────────────────────────────────────────────
window.setFilter=(cat,el)=>{
  filterCat=cat;
  document.querySelectorAll('.ftag').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderGrid();
};

// ─── LOAD & RENDER ───────────────────────────────────────
async function load(){
  const {data}=await sb.from('portfolio').select('*').eq('uid',uid).order('order_index').order('created_at',{ascending:false});
  allPort=data||[];

  // Stats
  const vis=allPort.filter(p=>p.is_visible).length;
  const cats=[...new Set(allPort.map(p=>p.category).filter(Boolean))];
  const totalLikes=allPort.reduce((s,p)=>s+(p.likes||0),0);
  document.getElementById('st-total').textContent=allPort.length;
  document.getElementById('st-vis').textContent=vis;
  document.getElementById('st-cat').textContent=cats.length;
  document.getElementById('st-likes').textContent=totalLikes;

  // Filter tabs
  const fb=document.getElementById('filter-bar');
  fb.innerHTML=`<button class="ftag ${filterCat==='all'?'on':''}" onclick="setFilter('all',this)">ທັງໝົດ (${allPort.length})</button>
    ${cats.map(c=>`<button class="ftag ${filterCat===c?'on':''}" onclick="setFilter('${c}',this)">📂 ${c} (${allPort.filter(p=>p.category===c).length})</button>`).join('')}`;

  renderGrid();
}

function renderGrid(){
  const el=document.getElementById('port-grid');
  const filtered=filterCat==='all'?allPort:allPort.filter(p=>p.category===filterCat);
  if(!filtered.length){el.innerHTML='<div class="empty">ຍັງບໍ່ມີຮູບ Portfolio — Upload ຂຶ້ນເທິງໄດ້ເລີຍ</div>';return;}
  el.innerHTML=`<div class="pg">${filtered.map(p=>`
    <div class="pi">
      ${p.mime_type?.startsWith('video')
        ?`<video src="${p.url}" muted preload="none" style="pointer-events:none"></video>`
        :`<img src="${p.url}" loading="lazy">`}
      ${p.category?`<div class="pi-cat">📂 ${p.category}</div>`:''}
      ${!p.is_visible?`<div class="pi-hidden-badge">🙈 ຊ່ອນ</div>`:''}
      <div class="pi-overlay">
        ${p.caption?`<div class="pi-caption">${p.caption}</div>`:''}
        <div class="pi-actions">
          <button class="pa pa-e" onclick="openEdit('${p.id}')">✏️ ແກ້ໄຂ</button>
          <button class="pa pa-h" onclick="toggleVisible('${p.id}',${p.is_visible})">${p.is_visible?'🙈 ຊ່ອນ':'👁 ສະແດງ'}</button>
          <button class="pa pa-d" onclick="delPort('${p.id}')">🗑</button>
        </div>
      </div>
    </div>`).join('')}</div>`;
}

// ─── INIT ────────────────────────────────────────────────
const {data:{session}}=await sb.auth.getSession();
if(!session){location.href='login.html';}
uid=session.user.id;
await sb.rpc('check_and_suspend_expired');
const {data:u}=await sb.from('profiles').select('studio_name,plan_status').eq('id',uid).single();
document.getElementById('sb-name').textContent=u?.studio_name||'';
document.getElementById('view-btn').href=`studio.html?id=${uid}`;
load();
</script>
<div id="sb-ov" onclick="closeSb()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:49;backdrop-filter:blur(2px)"></div>
<script>
function openSb(){document.querySelector('.sb').classList.add('open');document.getElementById('sb-ov').style.display='block';document.body.style.overflow='hidden';}
function closeSb(){document.querySelector('.sb').classList.remove('open');document.getElementById('sb-ov').style.display='none';document.body.style.overflow='';}
</script>
</body>
</html>
