<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SHARE LOD — Inbox</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--surface:#0f0f1a;--card:#13131f;--border:rgba(255,255,255,.06);--text:#f0eff8;--muted:#7a79a0;--a1:#7c5cfc;--grad:linear-gradient(135deg,#7c5cfc,#e05cfc);--sw:240px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans','Noto Sans Lao',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}
.sb{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;}
.sb-logo{padding:24px 20px 18px;border-bottom:1px solid var(--border);}
.sb-logo-txt{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sb-studio{font-size:12px;color:var(--muted);margin-top:3px;}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:500;transition:all .2s;cursor:pointer;border:none;background:none;width:100%;font-family:'DM Sans','Noto Sans Lao',sans-serif;}
.ni:hover{background:rgba(255,255,255,.05);color:var(--text);}
.ni.active{background:rgba(124,92,252,.15);color:var(--a1);}
.ni .ic{font-size:15px;width:20px;text-align:center;}
.sb-foot{padding:14px 10px;border-top:1px solid var(--border);}
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;}
.topbar{padding:0 28px;height:57px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.tb-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:800;}
/* MESSENGER LAYOUT */
.msng{display:flex;flex:1;height:calc(100vh - 57px);}
/* LEFT: Conversation list */
.conv-panel{width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--surface);}
.conv-search{padding:12px 16px;border-bottom:1px solid var(--border);}
.conv-search input{width:100%;padding:9px 14px;background:var(--bg);border:1px solid var(--border);border-radius:100px;color:var(--text);font-size:13px;font-family:'DM Sans','Noto Sans Lao',sans-serif;outline:none;transition:border-color .2s;}
.conv-search input:focus{border-color:rgba(124,92,252,.4);}
.conv-search input::placeholder{color:var(--muted);}
.conv-list{flex:1;overflow-y:auto;}
.conv-item{padding:13px 16px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:12px;position:relative;}
.conv-item:hover{background:rgba(255,255,255,.03);}
.conv-item.active{background:rgba(124,92,252,.1);}
.conv-av{width:44px;height:44px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;flex-shrink:0;position:relative;}
.conv-online{position:absolute;bottom:1px;right:1px;width:11px;height:11px;background:#44c868;border:2px solid var(--surface);border-radius:50%;}
.conv-info{flex:1;min-width:0;}
.conv-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-preview{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.conv-preview.unread{color:var(--text);font-weight:600;}
.conv-right{text-align:right;flex-shrink:0;}
.conv-time{font-size:10px;color:var(--muted);}
.conv-badge{background:var(--a1);color:#fff;border-radius:100px;font-size:10px;font-weight:700;padding:2px 7px;margin-top:4px;display:inline-block;}
.conv-empty{padding:40px;text-align:center;color:var(--muted);font-size:13px;}
/* RIGHT: Chat area */
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-header{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:13px;background:var(--surface);}
.chat-hav{width:40px;height:40px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0;}
.chat-hname{font-size:15px;font-weight:700;}
.chat-hsub{font-size:11px;color:var(--muted);margin-top:1px;}
.chat-messages{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:6px;}
/* Message bubbles */
.msg-wrap{display:flex;gap:8px;max-width:80%;}
.msg-wrap.from-me{align-self:flex-end;flex-direction:row-reverse;}
.msg-wrap.from-them{align-self:flex-start;}
.msg-av{width:30px;height:30px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;align-self:flex-end;}
.msg-av.me-av{background:rgba(124,92,252,.3);}
.msg-content{display:flex;flex-direction:column;gap:2px;}
.msg-wrap.from-me .msg-content{align-items:flex-end;}
.msg-sender-name{font-size:10px;color:var(--muted);margin-bottom:2px;padding:0 4px;}
.bubble{padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.6;word-break:break-word;}
.bubble.from-me{background:var(--grad);color:#fff;border-bottom-right-radius:5px;}
.bubble.from-them{background:var(--card);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:5px;}
.msg-time{font-size:9px;color:var(--muted);padding:0 4px;}
.msg-status{font-size:10px;color:var(--muted);padding:0 4px;}
/* Typing indicator */
.typing-ind{display:flex;align-items:center;gap:8px;padding:4px 0 8px;}
.typing-dots{display:flex;gap:4px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;}
.typing-dots span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:tdot 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
/* Input area */
.chat-input{padding:14px 22px;border-top:1px solid var(--border);background:var(--surface);}
.chat-input-row{display:flex;gap:10px;align-items:flex-end;}
.chat-inp{flex:1;padding:11px 16px;background:var(--bg);border:1px solid var(--border);border-radius:22px;color:var(--text);font-size:13px;font-family:'DM Sans','Noto Sans Lao',sans-serif;outline:none;resize:none;max-height:100px;transition:border-color .2s;line-height:1.5;}
.chat-inp:focus{border-color:rgba(124,92,252,.4);}
.chat-inp::placeholder{color:var(--muted);}
.send-btn{width:42px;height:42px;background:var(--grad);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .2s;flex-shrink:0;}
.send-btn:hover{opacity:.88;}
.send-btn svg{width:18px;height:18px;fill:#fff;}
/* No chat selected */
.no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);}
.no-chat-icon{font-size:56px;}
.no-chat-txt{font-size:15px;font-weight:500;}
.no-chat-sub{font-size:12px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--a1);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;display:block;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:900px){.sb{display:none;}.main{margin-left:0;}.conv-panel{width:260px;}}
@media(max-width:640px){.conv-panel{width:64px;}.conv-info,.conv-right{display:none;}}
</style>
</head>
<body>
<aside class="sb">
  <div class="sb-logo"><div class="sb-logo-txt">SHARE LOD</div><div class="sb-studio" id="sb-name"></div></div>
  <nav class="sb-nav">
    <a class="ni" href="dashboard.html"><span class="ic">📊</span>Dashboard</a>
    <a class="ni" href="clients.html"><span class="ic">👥</span>Clients</a>
    <a class="ni" href="upload.html"><span class="ic">⬆️</span>Upload</a>
    <a class="ni" href="portfolio.html"><span class="ic">🖼</span>Portfolio</a>
    <a class="ni active" href="inbox.html"><span class="ic">💬</span>Inbox <span id="nav-badge" style="background:var(--a1);color:#fff;border-radius:100px;font-size:9px;padding:1px 6px;margin-left:2px;display:none"></span></a>
    <a class="ni" href="community.html"><span class="ic">🌐</span>Community</a>
    <a class="ni" href="subscription.html"><span class="ic">💳</span>Subscription</a>
  </nav>
  <div class="sb-foot">
    <button class="ni" onclick="logout()" style="color:#ff7070;width:100%"><span class="ic">🚪</span>ອອກ</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="tb-title">💬 Messages</div>
  </div>
  <div class="msng">
    <div class="conv-panel">
      <div class="conv-search"><input id="conv-search" placeholder="🔍 ຄົ້ນຫາ..." oninput="filterConvs(this.value)"></div>
      <div class="conv-list" id="conv-list"><div class="spinner"></div></div>
    </div>
    <div class="chat-panel" id="chat-panel">
      <div class="no-chat">
        <div class="no-chat-icon">💬</div>
        <div class="no-chat-txt">ເລືອກການສົນທະນາ</div>
        <div class="no-chat-sub">ຂໍ້ຄວາມຈາກລູກຄ້າຈະສະແດງຢູ່ນີ້</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient('https://vuhjmwnxbvzppcoklgir.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1aGptd254YnZ6cHBjb2tsZ2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTM2NzAsImV4cCI6MjA5MDU2OTY3MH0.ijlH_tjBZm4irxrq-FXfIKIKdwZJTdTzaYbTPrpd928');

let uid, allConvs=[], selKey=null, realtimeCh=null;
window.logout=async()=>{await sb.auth.signOut();location.href='login.html';}

// ── Sound + Notification ──────────────────────────────────
function playSound(){
  try{
    const ctx=new AudioContext();
    [880,1100].forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+i*0.12);
      g.gain.linearRampToValueAtTime(0.25,ctx.currentTime+i*0.12+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.35);
      o.start(ctx.currentTime+i*0.12);
      o.stop(ctx.currentTime+i*0.12+0.4);
    });
  }catch(e){}
}
async function showBrowserNotif(title,body){
  if(!('Notification' in window))return;
  if(Notification.permission==='default') await Notification.requestPermission();
  if(Notification.permission==='granted'&&document.hidden){
    new Notification(title,{body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💬</text></svg>'});
  }
}

function timeAgo(ts){
  const d=Math.floor((Date.now()-new Date(ts))/1000);
  if(d<60)return'ຫາກໍ';if(d<3600)return Math.floor(d/60)+'ນ';
  if(d<86400)return Math.floor(d/3600)+'ຊມ';
  return new Date(ts).toLocaleDateString('lo-LA',{day:'numeric',month:'short'});
}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('lo-LA',{hour:'2-digit',minute:'2-digit'});}

// ── Init ──────────────────────────────────────────────────
const {data:{session}}=await sb.auth.getSession();
if(!session){location.href='login.html';}
uid=session.user.id;
const {data:u}=await sb.from('profiles').select('studio_name').eq('id',uid).single();
document.getElementById('sb-name').textContent=u?.studio_name||'';

// ── Load Conversations ────────────────────────────────────
async function loadConvs(keepSel=false){
  const {data}=await sb.from('messages').select('*').eq('studio_uid',uid).order('created_at',{ascending:false});
  const all=data||[];

  // Group by sender_key
  const map={};
  for(const m of all){
    const k=m.sender_key;
    if(!map[k]){map[k]={key:k,name:m.sender_name,last:m,unread:0,msgs:[]};}
    map[k].msgs.push(m);
    if(!m.is_read&&!m.is_from_studio) map[k].unread++;
  }
  allConvs=Object.values(map).sort((a,b)=>new Date(b.last.created_at)-new Date(a.last.created_at));

  const total=allConvs.reduce((s,c)=>s+c.unread,0);
  const badge=document.getElementById('nav-badge');
  badge.textContent=total;badge.style.display=total?'inline':'none';
  document.title=total?`(${total}) 💬 Messages — SHARE LOD`:'💬 Messages — SHARE LOD';

  renderConvList(allConvs);
  if(keepSel&&selKey) refreshChat(selKey);
}

function renderConvList(list){
  const el=document.getElementById('conv-list');
  if(!list.length){el.innerHTML='<div class="conv-empty">💬 ຍັງບໍ່ມີຂໍ້ຄວາມ<br><small>ລູກຄ້າຈະ Chat ຫາທ່ານຜ່ານ Link ຮູບ</small></div>';return;}
  el.innerHTML=list.map(c=>`
    <div class="conv-item ${selKey===c.key?'active':''}" onclick="openConv('${c.key}')">
      <div class="conv-av">${c.name.charAt(0).toUpperCase()}
        <div class="conv-online"></div>
      </div>
      <div class="conv-info">
        <div class="conv-name">${c.name}</div>
        <div class="conv-preview ${c.unread?'unread':''}">${c.last.is_from_studio?'ທ່ານ: ':''}${c.last.content}</div>
      </div>
      <div class="conv-right">
        <div class="conv-time">${timeAgo(c.last.created_at)}</div>
        ${c.unread?`<div class="conv-badge">${c.unread}</div>`:''}
      </div>
    </div>`).join('');
}

window.filterConvs=q=>{
  const f=allConvs.filter(c=>c.name.toLowerCase().includes(q.toLowerCase()));
  renderConvList(f);
};

// ── Open Conversation ─────────────────────────────────────
window.openConv=async(key)=>{
  selKey=key;
  const conv=allConvs.find(c=>c.key===key);
  if(!conv)return;
  renderConvList(allConvs);

  // Mark read
  await sb.from('messages').update({is_read:true}).eq('studio_uid',uid).eq('sender_key',key).eq('is_from_studio',false);
  conv.unread=0;
  renderConvList(allConvs);

  renderChatPanel(conv);
  await loadMessages(key,conv.name);
};

function renderChatPanel(conv){
  document.getElementById('chat-panel').innerHTML=`
    <div class="chat-header">
      <div class="chat-hav">${conv.name.charAt(0).toUpperCase()}</div>
      <div>
        <div class="chat-hname">${conv.name}</div>
        <div class="chat-hsub" style="color:#44c868">● ອອນລາຍ</div>
      </div>
    </div>
    <div class="chat-messages" id="chat-msgs"></div>
    <div class="chat-input">
      <div class="chat-input-row">
        <textarea class="chat-inp" id="chat-inp" rows="1" placeholder="ພິມຂໍ້ຄວາມ..." onkeydown="handleKey(event,'${conv.key}')"></textarea>
        <button class="send-btn" onclick="sendMsg('${conv.key}','${conv.name}')">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>`;
  autoResize();
}

async function loadMessages(key,name){
  const {data}=await sb.from('messages').select('*').eq('studio_uid',uid).eq('sender_key',key).order('created_at',{ascending:true});
  renderMessages(data||[],name);
}

async function refreshChat(key){
  const conv=allConvs.find(c=>c.key===key);
  if(!conv||!document.getElementById('chat-msgs'))return;
  await loadMessages(key,conv.name);
}

function renderMessages(msgs,clientName){
  const el=document.getElementById('chat-msgs');
  if(!el)return;
  if(!msgs.length){el.innerHTML='<div style="text-align:center;padding:30px;font-size:12px;color:var(--muted)">ເລີ່ມການສົນທະນາ...</div>';return;}

  let html='',prevDate='';
  for(const m of msgs){
    const date=new Date(m.created_at).toLocaleDateString('lo-LA');
    if(date!==prevDate){
      html+=`<div style="text-align:center;font-size:11px;color:var(--muted);margin:10px 0">${date}</div>`;
      prevDate=date;
    }
    const isMe=m.is_from_studio;
    html+=`<div class="msg-wrap ${isMe?'from-me':'from-them'}">
      <div class="msg-av ${isMe?'me-av':''}">${isMe?(u?.studio_name||'S').charAt(0):clientName.charAt(0)}</div>
      <div class="msg-content">
        <div class="bubble ${isMe?'from-me':'from-them'}">${m.content.replace(/\n/g,'<br>')}</div>
        <div class="msg-time">${fmtTime(m.created_at)}${isMe?` <span class="msg-status">${m.is_read?'✓✓':'✓'}</span>`:''}</div>
      </div>
    </div>`;
  }
  el.innerHTML=html;
  el.scrollTop=el.scrollHeight;
}

// ── Send Message ──────────────────────────────────────────
window.sendMsg=async(senderKey,senderName)=>{
  const inp=document.getElementById('chat-inp');
  const content=inp.value.trim(); if(!content)return;
  inp.value='';inp.style.height='auto';
  const {data:uData}=await sb.from('profiles').select('studio_name').eq('id',uid).single();
  await sb.from('messages').insert({
    studio_uid:uid,sender_name:uData?.studio_name||'Studio',
    sender_key:'studio-reply',content,
    is_from_studio:true,is_read:false,project_id:null
  });
  // Also create a "reply" visible to the client side by copying with their sender_key
  await sb.from('messages').insert({
    studio_uid:uid,sender_name:uData?.studio_name||'Studio',
    sender_key:senderKey,content,
    is_from_studio:true,is_read:true,project_id:null
  });
  refreshChat(senderKey);
};

window.handleKey=(e,key)=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();const conv=allConvs.find(c=>c.key===key);sendMsg(key,conv?.name||'');}
  autoResize();
};

function autoResize(){
  const inp=document.getElementById('chat-inp');
  if(inp){inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';}
}

// ── Realtime ──────────────────────────────────────────────
function setupRealtime(){
  if(realtimeCh) sb.removeChannel(realtimeCh);
  realtimeCh=sb.channel(`inbox-${uid}`)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`studio_uid=eq.${uid}`},payload=>{
      const m=payload.new;
      if(!m.is_from_studio){
        playSound();
        showBrowserNotif(`ຂໍ້ຄວາມຈາກ ${m.sender_name}`,m.content);
      }
      loadConvs(true);
    })
    .subscribe();
}

await loadConvs();
setupRealtime();
// Request notification permission on load
if('Notification' in window && Notification.permission==='default'){
  setTimeout(()=>Notification.requestPermission(),2000);
}
</script>
</body>
</html>
